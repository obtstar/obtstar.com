<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>阅读报告 · ObtStar</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <style>
    /* 全屏阅读模式专用样式 */
    :root {
      --reader-bg: #FAFBFC;
      --reader-text: #1F2937;
      --reader-muted: #6B7280;
      --reader-border: #E5E7EB;
      --reader-accent: #4F46E5;
      --reader-sidebar-w: 280px;
      --reader-content-max: 720px;
    }

    /* 深色主题 */
    .theme-dark {
      --reader-bg: #111827;
      --reader-text: #F3F4F6;
      --reader-muted: #9CA3AF;
      --reader-border: #374151;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    
    body {
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--reader-bg);
      color: var(--reader-text);
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* 顶部工具栏 */
    .reader-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--reader-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 100;
      transition: all 0.3s ease;
    }
    .theme-dark .reader-header {
      background: rgba(17,24,39,0.92);
    }

    .reader-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .reader-logo {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
    }

    .reader-title {
      font-size: 0.9375rem;
      color: var(--reader-muted);
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reader-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .reader-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--reader-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .reader-btn:hover {
      background: rgba(79,70,229,0.1);
      color: var(--reader-accent);
    }
    .reader-btn.active {
      background: var(--reader-accent);
      color: white;
    }

    .reader-progress-bar {
      position: fixed;
      top: 56px; left: 0; right: 0;
      height: 3px;
      background: var(--reader-border);
      z-index: 99;
    }
    .reader-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4F46E5, #7C3AED);
      width: 0%;
      transition: width 0.2s ease;
    }

    /* 主布局 */
    .reader-main {
      display: flex;
      margin-top: 56px;
      min-height: calc(100vh - 56px);
    }

    /* 左侧边栏 - 目录 */
    .reader-sidebar {
      position: fixed;
      top: 56px; left: 0;
      width: var(--reader-sidebar-w);
      height: calc(100vh - 56px);
      background: white;
      border-right: 1px solid var(--reader-border);
      overflow-y: auto;
      transform: translateX(0);
      transition: transform 0.3s ease;
      z-index: 50;
    }
    .theme-dark .reader-sidebar {
      background: #1F2937;
    }

    .reader-sidebar-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--reader-border);
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--reader-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .reader-toc {
      padding: 0.75rem;
    }

    .reader-toc-item {
      display: block;
      padding: 0.625rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--reader-text);
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }
    .reader-toc-item:hover {
      background: rgba(79,70,229,0.08);
    }
    .reader-toc-item.active {
      background: rgba(79,70,229,0.12);
      border-left-color: var(--reader-accent);
      color: var(--reader-accent);
      font-weight: 600;
    }
    .reader-toc-item.lv2 {
      padding-left: 1.75rem;
      font-size: 0.8125rem;
    }
    .reader-toc-item.lv3 {
      padding-left: 2.5rem;
      font-size: 0.8125rem;
    }

    /* 中间内容区 */
    .reader-content-wrapper {
      flex: 1;
      margin-left: var(--reader-sidebar-w);
      display: flex;
      justify-content: center;
      padding: 2.5rem 2rem;
    }

    .reader-content {
      width: 100%;
      max-width: var(--reader-content-max);
    }

    .reader-article {
      font-size: 1.0625rem;
      line-height: 1.85;
    }

    .reader-article h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      color: var(--reader-text);
      line-height: 1.3;
    }

    .reader-article h2 {
      font-size: 1.375rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      color: var(--reader-text);
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--reader-accent);
    }

    .reader-article h3 {
      font-size: 1.125rem;
      font-weight: 600;
      margin: 2rem 0 0.75rem;
      color: var(--reader-text);
    }

    .reader-article p {
      margin-bottom: 1.25rem;
      text-align: justify;
    }

    .reader-article ul, .reader-article ol {
      margin: 1rem 0 1.25rem 1.5rem;
    }

    .reader-article li {
      margin-bottom: 0.5rem;
    }

    .reader-article table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9375rem;
    }

    .reader-article th, .reader-article td {
      padding: 0.75rem 1rem;
      border: 1px solid var(--reader-border);
      text-align: left;
    }

    .reader-article th {
      background: rgba(79,70,229,0.08);
      font-weight: 600;
    }

    .reader-article tr:nth-child(even) {
      background: rgba(0,0,0,0.02);
    }
    .theme-dark .reader-article tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    /* 阅读进度指示器（右侧） */
    .reader-progress-indicator {
      position: fixed;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 40;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--reader-border);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .progress-dot:hover {
      transform: scale(1.5);
    }
    .progress-dot.active {
      background: var(--reader-accent);
    }

    /* 分页导航 */
    .reader-pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--reader-border);
    }

    .reader-page-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      border: 1px solid var(--reader-border);
      background: white;
      color: var(--reader-text);
      font-size: 0.9375rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .theme-dark .reader-page-btn {
      background: #1F2937;
    }
    .reader-page-btn:hover:not(:disabled) {
      border-color: var(--reader-accent);
      color: var(--reader-accent);
    }
    .reader-page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .reader-page-info {
      font-size: 0.875rem;
      color: var(--reader-muted);
    }

    /* 响应式设计 */
    
    /* 手机 (< 640px) */
    @media (max-width: 639px) {
      :root {
        --reader-sidebar-w: 0px;
      }
      
      .reader-header {
        padding: 0 1rem;
      }
      
      .reader-title {
        max-width: 120px;
      }
      
      .reader-content-wrapper {
        padding: 1.5rem 1rem;
      }
      
      .reader-article {
        font-size: 1rem;
      }
      
      .reader-article h1 {
        font-size: 1.375rem;
      }
      
      .reader-article h2 {
        font-size: 1.125rem;
      }
      
      .reader-progress-indicator {
        display: none;
      }
      
      .reader-pagination {
        flex-direction: column;
        gap: 1rem;
      }
      
      .reader-page-btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* 平板竖屏 (640px - 768px) */
    @media (min-width: 640px) and (max-width: 767px) {
      :root {
        --reader-sidebar-w: 0px;
      }
      
      .reader-content-wrapper {
        padding: 2rem 1.5rem;
      }
    }

    /* 平板横屏 / 小笔记本 (768px - 1024px) */
    @media (min-width: 768px) and (max-width: 1023px) {
      :root {
        --reader-sidebar-w: 220px;
        --reader-content-max: 600px;
      }
    }

    /* 小平板横屏 / 大平板 (1024px - 1280px) */
    @media (min-width: 1024px) and (max-width: 1279px) {
      :root {
        --reader-sidebar-w: 260px;
        --reader-content-max: 680px;
      }
    }

    /* 桌面 (1280px - 1536px) */
    @media (min-width: 1280px) and (max-width: 1535px) {
      :root {
        --reader-sidebar-w: 300px;
        --reader-content-max: 720px;
      }
    }

    /* 会议投影模式 (>= 1920px) */
    @media (min-width: 1920px) {
      :root {
        --reader-sidebar-w: 340px;
        --reader-content-max: 900px;
      }
      
      .reader-article {
        font-size: 1.25rem;
      }
      
      .reader-article h1 {
        font-size: 2.25rem;
      }
      
      .reader-article h2 {
        font-size: 1.625rem;
      }
    }

    /* 边栏切换按钮（移动端） */
    .sidebar-toggle {
      display: none;
    }
    @media (max-width: 767px) {
      .sidebar-toggle {
        display: flex;
      }
    }

    /* 字体大小控制 */
    .font-small .reader-article { font-size: 0.9375rem; }
    .font-medium .reader-article { font-size: 1.0625rem; }
    .font-large .reader-article { font-size: 1.25rem; }

    /* 加载动画 */
    .reader-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      color: var(--reader-muted);
    }
    .reader-loading i {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--reader-accent);
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="font-medium">

  <!-- 顶部工具栏 -->
  <header class="reader-header">
    <div class="reader-header-left">
      <span class="reader-logo" onclick="goBack()">Obt★Star</span>
      <span class="reader-title" id="reportTitle">加载中...</span>
    </div>
    <div class="reader-header-right">
      <button class="reader-btn sidebar-toggle" onclick="toggleSidebar()" title="目录">
        <i class="fas fa-bars"></i>
      </button>
      <button class="reader-btn" onclick="toggleTheme()" title="深色模式">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>
      <button class="reader-btn" onclick="decreaseFont()" title="字体减小">
        <i class="fas fa-font" style="font-size:0.8rem"></i>
      </button>
      <button class="reader-btn" onclick="increaseFont()" title="字体增大">
        <i class="fas fa-font" style="font-size:1rem"></i>
      </button>
      <button class="reader-btn" onclick="toggleFullscreen()" title="全屏">
        <i class="fas fa-expand" id="fullscreenIcon"></i>
      </button>
    </div>
  </header>

  <!-- 阅读进度条 -->
  <div class="reader-progress-bar">
    <div class="reader-progress-fill" id="progressFill"></div>
  </div>

  <!-- 主内容区 -->
  <div class="reader-main">
    
    <!-- 左侧边栏 -->
    <aside class="reader-sidebar" id="sidebar">
      <div class="reader-sidebar-header">
        <i class="fas fa-list-ul" style="margin-right:0.5rem"></i>目录
      </div>
      <nav class="reader-toc" id="tocList">
        <!-- 由 JS 填充 -->
      </nav>
    </aside>

    <!-- 中间内容 -->
    <div class="reader-content-wrapper">
      <article class="reader-content">
        <div class="reader-loading" id="loading">
          <i class="fas fa-spinner"></i>
          <p>正在加载报告内容...</p>
        </div>
        <div class="reader-article" id="articleBody" style="display:none">
          <!-- 由 JS 填充 -->
        </div>
        
        <!-- 分页导航 -->
        <div class="reader-pagination" id="pagination" style="display:none">
          <button class="reader-page-btn" id="prevBtn" onclick="changePage(-1)">
            <i class="fas fa-chevron-left"></i> 上一页
          </button>
          <span class="reader-page-info" id="pageInfo">1 / 1</span>
          <button class="reader-page-btn" id="nextBtn" onclick="changePage(1)">
            下一页 <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </article>
    </div>

    <!-- 右侧进度指示器 -->
    <div class="reader-progress-indicator" id="progressIndicator">
      <!-- 由 JS 填充 -->
    </div>
  </div>

  <!-- 数据文件 -->
  <script src="data/reports.js"></script>
  <script src="data/report-contents.js"></script>
  
  <script>
    // 获取URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const reportId = urlParams.get('id') || 'report-001';
    const report = REPORTS.find(r => r.id === reportId) || REPORTS[0];
    const content = REPORT_CONTENTS[reportId];

    // 状态变量
    let currentPage = 1;
    let currentSection = 0;
    const sectionsPerPage = 3;
    let isDark = false;
    let fontLevel = 1; // 0: small, 1: medium, 2: large

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      init();
    });

    function init() {
      // 设置标题
      document.title = `${report.title} - 阅读模式`;
      document.getElementById('reportTitle').textContent = report.title;

      // 加载内容
      if (content && content.sections) {
        renderTOC();
        renderProgressIndicator();
        renderPage(1);
      } else {
        document.getElementById('loading').innerHTML = `
          <i class="fas fa-exclamation-circle"></i>
          <p>暂无完整内容</p>
          <button class="reader-page-btn" style="margin-top:1rem" onclick="goBack()">
            返回报告详情
          </button>
        `;
      }

      // 滚动监听
      window.addEventListener('scroll', updateProgress);
    }

    // 渲染目录
    function renderTOC() {
      if (!content || !content.sections) return;
      
      const toc = document.getElementById('tocList');
      let html = '';
      
      content.sections.forEach((section, idx) => {
        const levelClass = section.level === 1 ? '' : (section.level === 2 ? 'lv2' : 'lv3');
        html += `<div class="reader-toc-item ${levelClass}" onclick="scrollToSection(${idx})" data-idx="${idx}">${section.title}</div>`;
      });
      
      toc.innerHTML = html;
    }

    // 渲染右侧进度点
    function renderProgressIndicator() {
      if (!content || !content.sections) return;
      
      const indicator = document.getElementById('progressIndicator');
      const totalSections = content.sections.length;
      const totalPages = Math.ceil(totalSections / sectionsPerPage);
      
      let html = '';
      for (let i = 0; i < totalPages; i++) {
        const activeClass = i === 0 ? 'active' : '';
        html += `<div class="progress-dot ${activeClass}" onclick="goToPage(${i + 1})" title="第${i + 1}页"></div>`;
      }
      
      indicator.innerHTML = html;
    }

    // 渲染当前页
    function renderPage(page) {
      currentPage = page;
      
      if (!content || !content.sections) return;
      
      const sections = content.sections;
      const totalPages = Math.ceil(sections.length / sectionsPerPage);
      
      const startIdx = (page - 1) * sectionsPerPage;
      const endIdx = Math.min(startIdx + sectionsPerPage, sections.length);
      const pageSections = sections.slice(startIdx, endIdx);
      
      // 更新文章内容
      const article = document.getElementById('articleBody');
      let html = `<h1>${report.title}</h1>`;
      
      pageSections.forEach(section => {
        const tag = section.level === 1 ? 'h2' : 'h3';
        html += `
          <${tag} id="section-${currentSection + pageSections.indexOf(section)}">${section.title}</${tag}>
          ${formatContent(section.content)}
        `;
      });
      
      article.innerHTML = html;
      article.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('pagination').style.display = 'flex';
      
      // 更新分页信息
      document.getElementById('pageInfo').textContent = `${page} / ${totalPages}`;
      document.getElementById('prevBtn').disabled = page === 1;
      document.getElementById('nextBtn').disabled = page === totalPages;
      
      // 更新进度指示器
      updateProgressDots(page);
      
      // 更新目录选中状态
      updateTOCHighlight();
    }

    // 格式化内容
    function formatContent(text) {
      if (!text) return '';
      
      let html = text;
      
      // 处理表格
      if (html.includes('|')) {
        const lines = html.split('\n');
        let tableHtml = '';
        let inTable = false;
        
        lines.forEach((line, idx) => {
          if (line.includes('|') && line.trim().startsWith('|')) {
            if (!inTable) {
              tableHtml += '<table>';
              inTable = true;
            }
            
            const cells = line.split('|').filter(c => c.trim());
            const isHeader = idx === 0 || line.includes('---');
            
            if (isHeader && idx === 0) {
              tableHtml += '<thead><tr>';
              cells.forEach(cell => {
                tableHtml += `<th>${cell.trim()}</th>`;
              });
              tableHtml += '</tr></thead><tbody>';
            } else if (!line.includes('---')) {
              tableHtml += '<tr>';
              cells.forEach(cell => {
                tableHtml += `<td>${cell.trim()}</td>`;
              });
              tableHtml += '</tr>';
            }
          } else {
            if (inTable) {
              tableHtml += '</tbody></table>';
              inTable = false;
            }
            if (line.trim()) {
              // 检查是否包含列表项
              if (line.trim().startsWith('•') || line.trim().startsWith('·')) {
                const items = line.split('\n').filter(l => l.trim().startsWith('•') || l.trim().startsWith('·'));
                if (items.length > 0) {
                  tableHtml += '<ul>';
                  items.forEach(item => {
                    tableHtml += `<li>${item.replace(/^[•·]\s*/, '')}</li>`;
                  });
                  tableHtml += '</ul>';
                }
              } else {
                tableHtml += `<p>${line}</p>`;
              }
            }
          }
        });
        
        if (inTable) {
          tableHtml += '</tbody></table>';
        }
        
        if (tableHtml.includes('<th>')) {
          html = tableHtml;
        }
      }
      
      // 处理列表项
      if (!html.includes('<ul>') && (html.includes('•') || html.includes('·'))) {
        const lines = html.split('\n');
        let listHtml = '';
        let inList = false;
        
        lines.forEach(line => {
          if (line.trim().startsWith('•') || line.trim().startsWith('·')) {
            if (!inList) {
              listHtml += '<ul>';
              inList = true;
            }
            listHtml += `<li>${line.replace(/^[•·]\s*/, '')}</li>`;
          } else {
            if (inList) {
              listHtml += '</ul>';
              inList = false;
            }
            if (line.trim() && !line.includes('<table>')) {
              listHtml += `<p>${line}</p>`;
            }
          }
        });
        
        if (inList) {
          listHtml += '</ul>';
        }
        
        if (listHtml && !html.includes('<ul>')) {
          html = listHtml;
        }
      }
      
      // 处理段落
      if (!html.includes('<ul>') && !html.includes('<table>') && !html.includes('<p>')) {
        html = html.split('\n\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
      }
      
      return html;
    }

    // 切换页码
    function changePage(delta) {
      if (!content || !content.sections) return;
      
      const totalPages = Math.ceil(content.sections.length / sectionsPerPage);
      const newPage = currentPage + delta;
      
      if (newPage >= 1 && newPage <= totalPages) {
        renderPage(newPage);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    // 跳转到指定页
    function goToPage(page) {
      renderPage(page);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 滚动到指定章节
    function scrollToSection(idx) {
      const el = document.getElementById(`section-${idx}`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // 更新当前页
        const page = Math.floor(idx / sectionsPerPage) + 1;
        if (page !== currentPage) {
          renderPage(page);
        }
      }
    }

    // 更新进度条
    function updateProgress() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = (scrollTop / docHeight) * 100;
      
      document.getElementById('progressFill').style.width = `${progress}%`;
    }

    // 更新进度点
    function updateProgressDots(page) {
      const dots = document.querySelectorAll('.progress-dot');
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === page - 1);
      });
    }

    // 更新目录高亮
    function updateTOCHighlight() {
      const items = document.querySelectorAll('.reader-toc-item');
      const startIdx = (currentPage - 1) * sectionsPerPage;
      const endIdx = Math.min(startIdx + sectionsPerPage, content.sections.length);
      
      items.forEach((item, idx) => {
        item.classList.toggle('active', idx >= startIdx && idx < endIdx);
      });
    }

    // 切换边栏（移动端）
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.style.transform = sidebar.style.transform === 'translateX(-100%)' 
        ? 'translateX(0)' 
        : 'translateX(-100%)';
    }

    // 切换主题
    function toggleTheme() {
      isDark = !isDark;
      document.body.classList.toggle('theme-dark', isDark);
      document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }

    // 字体大小控制
    function decreaseFont() {
      if (fontLevel > 0) {
        fontLevel--;
        updateFontSize();
      }
    }

    function increaseFont() {
      if (fontLevel < 2) {
        fontLevel++;
        updateFontSize();
      }
    }

    function updateFontSize() {
      document.body.classList.remove('font-small', 'font-medium', 'font-large');
      if (fontLevel === 0) document.body.classList.add('font-small');
      else if (fontLevel === 2) document.body.classList.add('font-large');
      else document.body.classList.add('font-medium');
    }

    // 全屏
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fullscreenIcon').className = 'fas fa-compress';
      } else {
        document.exitFullscreen();
        document.getElementById('fullscreenIcon').className = 'fas fa-expand';
      }
    }

    // 返回
    function goBack() {
      window.location.href = `report-detail.html?id=${reportId}`;
    }
  </script>
</body>
</html>
