<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>404 - 页面未找到 · ObtStar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    /* 关键CSS内联，确保首屏渲染 */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4F46E5;
      --primary-dark: #7C3AED;
      --bg-base: #F8FAFC;
      --text-title: #0F172A;
      --text-body: #334155;
      --text-muted: #64748B;
    }

    [data-theme="dark"] {
      --bg-base: #0F172A;
      --text-title: #F1F5F9;
      --text-body: #CBD5E1;
      --text-muted: #94A3B8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-base);
      color: var(--text-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .error-container {
      text-align: center;
      max-width: 480px;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-code {
      font-size: clamp(6rem, 15vw, 8rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
    }

    .error-title {
      font-size: 1.75rem;
      color: var(--text-title);
      margin-bottom: 0.75rem;
      font-weight: 700;
    }

    .error-desc {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 0.9375rem;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-body);
      border: 1.5px solid var(--text-muted);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .error-illustration {
      width: 200px;
      height: 200px;
      margin: 0 auto 2rem;
      position: relative;
    }

    .orbit {
      position: absolute;
      border: 2px dashed var(--text-muted);
      border-radius: 50%;
      opacity: 0.3;
      animation: rotate 20s linear infinite;
    }

    .orbit-1 {
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .orbit-2 {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      animation-direction: reverse;
      animation-duration: 15s;
    }

    .planet {
      position: absolute;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 40px rgba(79, 70, 229, 0.4);
    }

    .planet::before {
      content: '?';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 28px;
      font-weight: 700;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 减少动画偏好 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
  <script>
    // 防止FOUC的内联主题脚本
    (function() {
      const savedTheme = localStorage.getItem('obtstar-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <main class="error-container" role="main" aria-labelledby="error-title">
    <div class="error-illustration" aria-hidden="true">
      <div class="orbit orbit-1"></div>
      <div class="orbit orbit-2"></div>
      <div class="planet"></div>
    </div>
    
    <h1 class="error-code" aria-label="404 错误">404</h1>
    <h2 id="error-title" class="error-title">页面迷失在星空中</h2>
    <p class="error-desc">
      抱歉，您访问的页面似乎不存在或已被移除。<br>
      请检查网址是否正确，或返回首页继续探索。
    </p>
    
    <nav class="error-actions" aria-label="错误页面导航">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        返回首页
      </a>
      <a href="/reports.html" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        浏览报告
      </a>
    </nav>
  </main>
</body>
</html>
