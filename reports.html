<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>研究报告库 · ObtStar</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <style>
    .reports-hero {
      background: linear-gradient(160deg, #EEF2FF 0%, #F8FAFC 50%, #EDE9FE 100%);
      padding: 7rem 0 4rem;
      position: relative;
      overflow: hidden;
    }
    .reports-hero::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(79,70,229,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      position: sticky;
      top: 88px;
      max-height: calc(100vh - 108px);
      overflow-y: auto;
    }
    .sidebar-panel {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .sidebar-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .sidebar-cat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.875rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.9rem;
      color: var(--text-body);
      margin-bottom: 0.125rem;
    }
    .sidebar-cat-item:hover { background: rgba(79,70,229,0.06); color: var(--primary); }
    .sidebar-cat-item.active {
      background: linear-gradient(135deg, rgba(79,70,229,0.12), rgba(124,58,237,0.08));
      color: var(--primary);
      font-weight: 600;
    }
    .sidebar-cat-item .cat-left { display: flex; align-items: center; gap: 0.5rem; }
    .sidebar-count {
      font-size: 0.75rem;
      background: rgba(79,70,229,0.1);
      color: var(--primary);
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-weight: 600;
    }
    .sidebar-cat-item.active .sidebar-count {
      background: var(--primary);
      color: white;
    }

    /* 顶部工具栏 */
    .reports-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .toolbar-left { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .toolbar-right { display: flex; align-items: center; gap: 0.75rem; }
    .view-toggle {
      display: flex;
      background: var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: 3px;
    }
    .view-btn {
      padding: 0.375rem 0.625rem;
      border-radius: calc(var(--radius-md) - 3px);
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
      font-size: 0.875rem;
    }
    .view-btn.active { background: white; color: var(--primary); box-shadow: var(--shadow-sm); }

    .sort-select {
      padding: 0.5rem 0.875rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      color: var(--text-body);
      background: white;
      cursor: pointer;
      outline: none;
      font-family: inherit;
    }
    .sort-select:focus { border-color: var(--primary); }

    /* 结果信息栏 */
    .results-info {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .results-info strong { color: var(--text-title); }

    /* 列表视图 */
    .list-view .report-card {
      flex-direction: row;
      gap: 1.5rem;
      align-items: flex-start;
    }
    .list-view .report-card .card-aside {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      min-width: 120px;
      padding: 0.5rem;
      background: var(--bg-subtle);
      border-radius: var(--radius-md);
    }

    /* 新增入口卡片 */
    .add-report-card {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: transparent;
      color: var(--text-muted);
      min-height: 220px;
    }
    .add-report-card:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(79,70,229,0.04);
      transform: translateY(-4px);
    }
    .add-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; transition: all var(--transition); }
    .add-report-card:hover .add-icon { opacity: 1; transform: scale(1.1); }

    /* 标签过滤条 */
    .tag-filter-area {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body class="page-body">

  <div class="reading-progress" id="readingProgress" style="width:0%"></div>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;width:100%">
      <a href="index.html" class="logo">Obt<span>★</span>Star</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">首页</a></li>
        <li><a href="reports.html" class="active">研究报告</a></li>
        <li><a href="about.html">关于</a></li>
        <li><a href="reports.html" class="nav-cta">浏览全部 →</a></li>
      </ul>
      <div class="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <!-- 页面 Hero -->
  <div class="reports-hero">
    <div class="container">
      <div class="breadcrumb" style="margin-bottom:1.5rem" data-aos="fade-right">
        <a href="index.html">首页</a>
        <span class="sep">/</span>
        <span>研究报告</span>
      </div>
      <div data-aos="fade-up">
        <span class="section-label">Research Library</span>
        <h1 style="margin-top:0.5rem;margin-bottom:0.75rem">研究报告库</h1>
        <p style="color:var(--text-body);font-size:1.0625rem;max-width:560px;line-height:1.8">
          汇聚 AI 时代核心研究成果，按主题分类清晰展示。
          在搜索框输入关键词快速定位，或通过左侧分类深度探索。
        </p>
      </div>
      <!-- 搜索栏 -->
      <div style="margin-top:2rem;max-width:560px" data-aos="fade-up" data-aos-delay="100">
        <div class="search-wrap" style="max-width:100%">
          <i class="fa fa-search search-icon"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="搜索报告标题、标签、摘要…" />
        </div>
        <div class="tag-filter-area" id="hotTags">
          <!-- 热门标签由 JS 渲染 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 主体：侧边栏 + 内容 -->
  <section class="section-sm">
    <div class="container" style="display:flex;gap:2.5rem;align-items:flex-start">

      <!-- ── 侧边栏 ── -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-panel">
          <div class="sidebar-title">主题分类</div>
          <div id="sidebarCats"><!-- 由 JS 渲染 --></div>
        </div>
        <div class="sidebar-panel">
          <div class="sidebar-title">报告来源</div>
          <div id="sidebarSources"><!-- 由 JS 渲染 --></div>
        </div>
        <!-- ↓ 新增主题入口 ↓ -->
        <div class="sidebar-panel" style="text-align:center;padding:1.25rem">
          <div style="font-size:1.5rem;margin-bottom:0.5rem">🗂️</div>
          <div style="font-size:0.875rem;font-weight:600;color:var(--text-title);margin-bottom:0.25rem">提交新主题</div>
          <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.875rem">想要添加新的研究领域？</div>
          <a href="about.html#contribute" class="btn btn-outline btn-sm" style="width:100%;justify-content:center">提交建议</a>
        </div>
      </aside>

      <!-- ── 报告列表主区 ── -->
      <div style="flex:1;min-width:0">
        <!-- 工具栏 -->
        <div class="reports-toolbar">
          <div class="toolbar-left">
            <span class="results-info" id="resultsInfo">共 <strong>6</strong> 篇报告</span>
            <div class="filter-bar" id="filterBar" style="padding:0">
              <!-- 快速筛选标签 -->
            </div>
          </div>
          <div class="toolbar-right">
            <select class="sort-select" id="sortSelect" onchange="applyFilter()">
              <option value="date-desc">最新优先</option>
              <option value="date-asc">最早优先</option>
              <option value="pages-desc">页数最多</option>
              <option value="pages-asc">页数最少</option>
              <option value="title">标题 A→Z</option>
            </select>
            <div class="view-toggle">
              <div class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="网格视图">
                <i class="fa fa-th-large"></i>
              </div>
              <div class="view-btn" id="listViewBtn" onclick="setView('list')" title="列表视图">
                <i class="fa fa-list"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- 当前分类标题 -->
        <div id="currentCatHeader" style="margin-bottom:1.5rem;display:none">
          <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
            <span id="currentCatIcon" style="font-size:1.75rem"></span>
            <div>
              <h2 style="font-size:1.375rem;margin:0" id="currentCatName"></h2>
              <p style="font-size:0.875rem;color:var(--text-muted);margin:0.25rem 0 0" id="currentCatCount"></p>
            </div>
            <button onclick="setCategory('all')" class="btn btn-ghost btn-sm" style="margin-left:auto">
              <i class="fa fa-times"></i> 清除筛选
            </button>
          </div>
        </div>

        <!-- 报告卡片网格 -->
        <div id="reportsContainer" class="grid-3" style="gap:1.25rem"></div>

        <!-- 空状态 -->
        <div id="emptyState" class="empty-state" style="display:none">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">没有找到相关报告</div>
          <div class="empty-desc">试试换个关键词，或者清除筛选条件</div>
          <button onclick="resetAll()" class="btn btn-primary btn-sm" style="margin-top:1rem">清除所有筛选</button>
        </div>

        <!-- ↓ 新增报告入口 ↓ -->
        <div style="margin-top:1.5rem">
          <div class="add-report-card" onclick="location.href='about.html#contribute'">
            <div class="add-icon">＋</div>
            <div style="font-weight:600;margin-bottom:0.375rem">提交新报告</div>
            <div style="font-size:0.875rem">如果您有优质研究报告希望收录到这里，欢迎联系我们</div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem">
        <div class="footer-logo">Obt★Star</div>
        <div style="display:flex;gap:2rem;font-size:0.875rem">
          <a href="index.html" style="color:rgba(255,255,255,0.55)">首页</a>
          <a href="reports.html" style="color:rgba(255,255,255,0.55)">报告库</a>
          <a href="about.html" style="color:rgba(255,255,255,0.55)">关于</a>
        </div>
      </div>
      <div class="footer-bottom">
        <div>© 2026 ObtStar · All rights reserved</div>
      </div>
    </div>
  </footer>

  <script src="data/reports.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 600, easing: 'ease-out-cubic', once: true, offset: 40 });

    let currentCat = 'all';
    let currentSearch = '';
    let currentView = 'grid';
    let currentSort = 'date-desc';

    // 从 URL 读取分类参数
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('cat')) currentCat = urlParams.get('cat');

    // ── 导航 ──
    function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
      const progress = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
      document.getElementById('readingProgress').style.width = progress + '%';
    });

    // ── 渲染侧边栏分类 ──
    function renderSidebar() {
      const counts = {};
      REPORTS.forEach(r => { counts[r.category] = (counts[r.category] || 0) + 1; });
      const total = REPORTS.length;
      document.getElementById('sidebarCats').innerHTML = CATEGORIES.map(c => {
        const cnt = c.id === 'all' ? total : (counts[c.id] || 0);
        return `
          <div class="sidebar-cat-item ${currentCat === c.id ? 'active' : ''}" onclick="setCategory('${c.id}')">
            <div class="cat-left"><span>${c.icon}</span><span>${c.name}</span></div>
            <span class="sidebar-count">${cnt}</span>
          </div>
        `;
      }).join('');

      // 来源
      const sources = {};
      REPORTS.forEach(r => { sources[r.source] = (sources[r.source] || 0) + 1; });
      document.getElementById('sidebarSources').innerHTML = Object.entries(sources).map(([s, cnt]) => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0.5rem;font-size:0.875rem;color:var(--text-body)">
          <span>${s}</span>
          <span class="sidebar-count">${cnt}</span>
        </div>
      `).join('');
    }

    // ── 渲染热门标签 ──
    function renderHotTags() {
      const tagMap = {};
      REPORTS.forEach(r => r.tags.forEach(t => { tagMap[t] = (tagMap[t] || 0) + 1; }));
      const hot = Object.entries(tagMap).sort((a,b) => b[1]-a[1]).slice(0, 8);
      document.getElementById('hotTags').innerHTML =
        hot.map(([t]) => `<span class="tag" style="cursor:pointer" onclick="searchTag('${t}')">${t}</span>`).join('');
    }

    // ── 设置分类 ──
    function setCategory(id) {
      currentCat = id;
      history.pushState({}, '', id === 'all' ? 'reports.html' : `reports.html?cat=${id}`);
      renderSidebar();
      applyFilter();
      const header = document.getElementById('currentCatHeader');
      if (id !== 'all') {
        const cat = CATEGORIES.find(c => c.id === id);
        document.getElementById('currentCatIcon').textContent = cat.icon;
        document.getElementById('currentCatName').textContent = cat.name;
        header.style.display = 'block';
      } else { header.style.display = 'none'; }
    }

    // ── 搜索标签点击 ──
    function searchTag(tag) {
      document.getElementById('searchInput').value = tag;
      currentSearch = tag;
      applyFilter();
    }

    // ── 设置视图 ──
    function setView(v) {
      currentView = v;
      document.getElementById('gridViewBtn').classList.toggle('active', v === 'grid');
      document.getElementById('listViewBtn').classList.toggle('active', v === 'list');
      const container = document.getElementById('reportsContainer');
      if (v === 'grid') {
        container.classList.remove('list-view');
        container.style.gridTemplateColumns = 'repeat(3,1fr)';
      } else {
        container.classList.add('list-view');
        container.style.gridTemplateColumns = '1fr';
      }
    }

    // ── 重置所有 ──
    function resetAll() {
      currentCat = 'all';
      currentSearch = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('currentCatHeader').style.display = 'none';
      renderSidebar();
      applyFilter();
    }

    // ── 应用筛选 & 排序 ──
    function applyFilter() {
      currentSort = document.getElementById('sortSelect').value;
      let filtered = REPORTS.filter(r => {
        const matchCat = currentCat === 'all' || r.category === currentCat;
        const q = currentSearch.toLowerCase();
        const matchSearch = !q || r.title.toLowerCase().includes(q)
          || (r.subtitle || '').toLowerCase().includes(q)
          || r.summary.toLowerCase().includes(q)
          || r.tags.some(t => t.toLowerCase().includes(q));
        return matchCat && matchSearch;
      });

      // 排序
      filtered.sort((a, b) => {
        if (currentSort === 'date-desc') return b.date.localeCompare(a.date);
        if (currentSort === 'date-asc') return a.date.localeCompare(b.date);
        if (currentSort === 'pages-desc') return b.pages - a.pages;
        if (currentSort === 'pages-asc') return a.pages - b.pages;
        if (currentSort === 'title') return a.title.localeCompare(b.title, 'zh');
        return 0;
      });

      // 更新分类标题计数
      document.getElementById('currentCatCount').textContent = `找到 ${filtered.length} 篇报告`;
      document.getElementById('resultsInfo').innerHTML = `共 <strong>${filtered.length}</strong> 篇报告`;

      const container = document.getElementById('reportsContainer');
      const empty = document.getElementById('emptyState');

      if (!filtered.length) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      container.innerHTML = filtered.map((r, i) => {
        const cat = CATEGORIES.find(c => c.id === r.category);
        if (currentView === 'list') {
          return `
            <div class="report-card" onclick="location.href='report-detail.html?id=${r.id}'" style="flex-direction:row;align-items:flex-start;gap:1.25rem;padding:1.25rem 1.5rem">
              <div class="report-card-accent" style="background:linear-gradient(to bottom,${r.color||'#4F46E5'},${r.color||'#7C3AED'})"></div>
              <div style="width:56px;height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:14px;background:linear-gradient(135deg,${r.color||'#4F46E5'}18,${r.color||'#7C3AED'}28);font-size:1.75rem">
                ${cat ? cat.icon : '📄'}
              </div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:flex-start;gap:0.75rem;flex-wrap:wrap">
                  <div style="flex:1;min-width:200px">
                    <span class="tag" style="font-size:0.7rem;background:${r.color||'#4F46E5'}15;color:${r.color||'#4F46E5'};margin-bottom:0.375rem;display:inline-flex">
                      ${cat ? cat.name : ''}
                    </span>
                    <div class="report-card-title" style="font-size:1.0625rem">${r.title}</div>
                    <div class="report-card-subtitle">${r.subtitle}</div>
                  </div>
                  <div class="report-card-meta" style="border-top:none;padding:0;white-space:nowrap">
                    <span class="meta-item"><i class="fa fa-file-alt"></i> ${r.pages}页</span>
                    <span class="meta-item"><i class="fa fa-calendar"></i> ${r.date}</span>
                  </div>
                </div>
                <p class="report-card-summary" style="margin-top:0.625rem;-webkit-line-clamp:2">${r.summary}</p>
                <div class="report-card-tags" style="margin-top:0.625rem">
                  ${r.tags.slice(0,4).map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
              </div>
            </div>
          `;
        }
        return `
          <div class="report-card" onclick="location.href='report-detail.html?id=${r.id}'" data-aos="fade-up" data-aos-delay="${(i%3)*60}">
            <div class="report-card-accent" style="background:linear-gradient(to bottom,${r.color||'#4F46E5'},${r.color||'#7C3AED'})"></div>
            <div class="report-card-header">
              <div class="report-card-icon" style="background:linear-gradient(135deg,${r.color||'#4F46E5'}18,${r.color||'#7C3AED'}28);font-size:1.5rem">
                ${cat ? cat.icon : '📄'}
              </div>
              <div style="flex:1;padding-left:0.75rem">
                <span class="tag" style="font-size:0.7rem;background:${r.color||'#4F46E5'}15;color:${r.color||'#4F46E5'};margin-bottom:0.375rem;display:inline-flex">
                  ${cat ? cat.name : ''}
                </span>
                <div class="report-card-title">${r.title}</div>
                <div class="report-card-subtitle">${r.subtitle}</div>
              </div>
            </div>
            <p class="report-card-summary">${r.summary}</p>
            <div class="report-card-tags">
              ${r.tags.slice(0,3).map(t => `<span class="tag">${t}</span>`).join('')}
              ${r.tags.length > 3 ? `<span class="tag" style="opacity:0.55">+${r.tags.length-3}</span>` : ''}
            </div>
            <div class="report-card-meta">
              <span class="meta-item"><i class="fa fa-file-alt"></i> ${r.pages} 页</span>
              <span class="meta-item"><i class="fa fa-calendar"></i> ${r.date}</span>
              <span class="meta-item"><i class="fa fa-user"></i> ${r.source}</span>
            </div>
          </div>
        `;
      }).join('');
      AOS.refreshHard();
    }

    // 搜索监听
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearch = e.target.value;
      applyFilter();
    });

    // 初始化
    renderSidebar();
    renderHotTags();
    applyFilter();
    if (currentCat !== 'all') {
      const cat = CATEGORIES.find(c => c.id === currentCat);
      if (cat) {
        document.getElementById('currentCatIcon').textContent = cat.icon;
        document.getElementById('currentCatName').textContent = cat.name;
        document.getElementById('currentCatHeader').style.display = 'block';
      }
    }
  </script>
</body>
</html>
