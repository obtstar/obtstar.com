<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报告详情 · ObtStar</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <style>
    .detail-hero {
      padding: 6rem 0 4rem;
      position: relative;
      overflow: hidden;
    }
    .detail-hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.06;
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, #4F46E5 1px, transparent 1px),
        linear-gradient(to bottom, #4F46E5 1px, transparent 1px);
    }
    .detail-hero-glow {
      position: absolute;
      top: -80px; right: -80px;
      width: 500px; height: 500px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      background: radial-gradient(circle, var(--report-color, #4F46E5), transparent);
      z-index: 0;
    }
    .detail-hero-content { position: relative; z-index: 1; }

    .detail-layout {
      display: grid;
      grid-template-columns: 240px 1fr 220px;
      gap: 2.5rem;
      align-items: start;
    }
    @media (max-width: 1100px) {
      .detail-layout { grid-template-columns: 1fr; }
      .detail-toc { display: none; }
    }
    @media (max-width: 768px) {
      .detail-sidebar-left { display: none; }
    }

    /* 左侧信息面板 */
    .info-panel {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: sticky;
      top: 88px;
    }
    .info-panel-header {
      padding: 1.25rem;
      background: linear-gradient(135deg, var(--report-color, #4F46E5), var(--report-color-2, #7C3AED));
      color: white;
      text-align: center;
    }
    .info-panel-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .info-panel-list { padding: 0; list-style: none; }
    .info-panel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }
    .info-panel-item:last-child { border-bottom: none; }
    .info-panel-label { color: var(--text-muted); }
    .info-panel-value { font-weight: 600; color: var(--text-title); text-align: right; max-width: 120px; }

    /* 主内容区 */
    .detail-main { min-width: 0; }
    .detail-section {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .detail-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-title);
      margin-bottom: 1.25rem;
      padding-bottom: 0.875rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }
    .ds-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(79,70,229,0.12), rgba(124,58,237,0.08));
      border-radius: var(--radius-md);
      font-size: 1rem;
    }
    .summary-text {
      font-size: 1.0625rem;
      line-height: 1.9;
      color: var(--text-body);
    }

    /* 封面 */
    .report-cover {
      height: 280px;
      border-radius: var(--radius-xl);
      position: relative;
      overflow: hidden;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cover-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .cover-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
      padding: 2rem;
    }
    .cover-icon { font-size: 4rem; margin-bottom: 1rem; }
    .cover-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    .cover-sub { font-size: 1rem; opacity: 0.9; }

    /* 核心亮点 */
    .highlight-item {
      display: flex;
      align-items: flex-start;
      gap: 0.875rem;
      padding: 1rem 1.25rem;
      background: linear-gradient(135deg, rgba(79,70,229,0.04), rgba(124,58,237,0.02));
      border-radius: var(--radius-md);
      border-left: 3px solid var(--report-color, #4F46E5);
    }
    .hi-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--report-color, #4F46E5), #7C3AED);
      color: white;
      border-radius: 50%;
      font-size: 0.875rem;
      flex-shrink: 0;
    }

    /* 章节目录 */
    .chapter-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg-subtle);
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
    }
    .chapter-item:hover {
      background: rgba(79,70,229,0.06);
      transform: translateX(4px);
    }
    .chapter-num {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--report-color, #4F46E5), #7C3AED);
      color: white;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* 分享栏 */
    .share-bar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-body);
      font-size: 0.9375rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .share-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* 右侧目录 */
    .detail-toc {
      position: sticky;
      top: 88px;
    }
    .toc-nav {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
    }
    .toc-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .toc-item {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.5rem 0.625rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--text-body);
      transition: all 0.15s ease;
    }
    .toc-item:hover { background: rgba(79,70,229,0.06); color: var(--primary); }
    .toc-item.active { background: rgba(79,70,229,0.1); color: var(--primary); font-weight: 600; }
    .toc-num {
      width: 24px;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* 加载状态 */
    .loading-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 错误状态 */
    .error-container {
      text-align: center;
      padding: 4rem 2rem;
    }
    .error-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">ObtStar</a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">首页</a>
        <a href="reports.html">研究报告</a>
        <a href="about.html">关于</a>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <button class="theme-toggle" id="themeToggle" title="切换深色模式" aria-label="切换深色模式">
          <i class="fas fa-sun"></i>
          <i class="fas fa-moon"></i>
        </button>
        <button class="nav-toggle" onclick="toggleNav()"><i class="fa fa-bars"></i></button>
      </div>
    </div>
    <div class="reading-progress" id="readingProgress"></div>
  </nav>

  <!-- 加载状态 -->
  <div id="loadingState" class="loading-container">
    <div class="loading-spinner"></div>
  </div>

  <!-- 错误状态 -->
  <div id="errorState" class="error-container" style="display:none">
    <div class="error-icon">⚠️</div>
    <h2>加载失败</h2>
    <p id="errorMessage">无法加载报告数据</p>
    <button onclick="location.reload()" class="btn btn-primary" style="margin-top:1rem">
      <i class="fa fa-refresh"></i> 重新加载
    </button>
    <a href="reports.html" class="btn btn-ghost" style="margin-top:0.5rem">返回报告列表</a>
  </div>

  <!-- 主内容 -->
  <div id="mainContent" style="display:none">
    <!-- Hero -->
    <div class="detail-hero" id="detailHero">
      <div class="detail-hero-bg"></div>
      <div class="detail-hero-glow" id="heroGlow"></div>
      <div class="container detail-hero-content">
        <div class="breadcrumb" style="margin-bottom:1.5rem">
          <a href="index.html">首页</a>
          <span class="sep">/</span>
          <a href="reports.html">研究报告</a>
          <span class="sep">/</span>
          <span id="breadcrumbTitle" style="color:var(--text-title)">报告详情</span>
        </div>
        <div style="display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap">
          <div style="flex:1;min-width:280px" data-aos="fade-right">
            <div id="heroCategoryBadge" style="margin-bottom:1rem"></div>
            <h1 id="heroTitle" style="margin-bottom:0.625rem"></h1>
            <p id="heroSubtitle" style="font-size:1.0625rem;color:var(--text-body);margin-bottom:1.5rem"></p>
            <div id="heroTags" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:2rem"></div>
            <div id="heroActions" style="display:flex;gap:1rem;flex-wrap:wrap">
              <button onclick="copyLink()" class="btn btn-primary"><i class="fa fa-share-alt"></i> 分享报告</button>
              <a id="readerModeBtn" href="#" class="btn btn-ghost"><i class="fa fa-book-reader"></i> 进入阅读模式</a>
              <a href="reports.html" class="btn btn-ghost"><i class="fa fa-arrow-left"></i> 返回列表</a>
            </div>
          </div>
          <div id="quickStats" class="glass-panel" style="padding:1.5rem;min-width:240px;max-width:320px" data-aos="fade-left"></div>
        </div>
      </div>
    </div>

    <!-- 详情主体 -->
    <section class="section-sm">
      <div class="container">
        <div class="detail-layout">
          <!-- 左侧信息面板 -->
          <div id="detailSidebarLeft">
            <div class="info-panel">
              <div class="info-panel-header" id="infoPanelHeader">
                <div class="info-panel-icon" id="infoPanelIcon">📄</div>
                <div style="font-size:0.875rem;font-weight:600" id="infoPanelCat">分类</div>
              </div>
              <ul class="info-panel-list" id="infoPanelList"></ul>
            </div>
            <div style="margin-top:1rem;display:flex;flex-direction:column;gap:0.625rem">
              <button onclick="copyLink()" class="btn btn-primary btn-sm" style="width:100%;justify-content:center">
                <i class="fa fa-link"></i> 复制链接
              </button>
              <a href="reports.html" class="btn btn-ghost btn-sm" style="width:100%;justify-content:center">
                <i class="fa fa-th-large"></i> 浏览更多
              </a>
            </div>
          </div>

          <!-- 主内容 -->
          <div class="detail-main">
            <div class="report-cover" id="reportCover">
              <div class="cover-grid"></div>
              <div class="cover-content">
                <div class="cover-icon" id="coverIcon">📄</div>
                <div class="cover-title" id="coverTitle"></div>
                <div class="cover-sub" id="coverSub"></div>
              </div>
            </div>

            <div class="detail-section" data-aos="fade-up">
              <div class="detail-section-title">
                <span class="ds-icon">📝</span> 报告摘要
              </div>
              <p class="summary-text" id="summaryText"></p>
            </div>

            <div class="detail-section" data-aos="fade-up">
              <div class="detail-section-title">
                <span class="ds-icon">💡</span> 核心亮点
              </div>
              <div id="highlightsList" style="display:flex;flex-direction:column;gap:0.625rem"></div>
            </div>

            <div class="detail-section" data-aos="fade-up">
              <div class="detail-section-title">
                <span class="ds-icon">📋</span> 章节目录
              </div>
              <div id="chaptersList" style="display:flex;flex-direction:column;gap:0.75rem"></div>
            </div>

            <div class="detail-section" data-aos="fade-up">
              <div class="detail-section-title">
                <span class="ds-icon">🏷️</span> 研究标签
              </div>
              <div id="allTagsList" style="display:flex;flex-wrap:wrap;gap:0.5rem"></div>
            </div>

            <div class="detail-section" data-aos="fade-up">
              <div class="detail-section-title">
                <span class="ds-icon">📤</span> 分享这篇报告
              </div>
              <div class="share-bar">
                <button class="share-btn" onclick="copyLink()"><i class="fa fa-link"></i> 复制链接</button>
                <button class="share-btn" onclick="shareTwitter()"><i class="fab fa-twitter"></i> Twitter</button>
                <button class="share-btn" onclick="window.print()"><i class="fa fa-print"></i> 打印</button>
              </div>
            </div>
          </div>

          <!-- 右侧目录 -->
          <div class="detail-toc">
            <div class="toc-nav">
              <div class="toc-title">目录导航</div>
              <div id="tocList"></div>
            </div>
          </div>
        </div>

        <!-- 相关推荐 -->
        <div style="margin-top:3rem" data-aos="fade-up">
          <div class="section-header" style="margin-bottom:1.5rem">
            <span class="section-label">延伸阅读</span>
            <h2 class="section-title" style="margin-top:0.5rem;font-size:1.75rem">相关报告推荐</h2>
          </div>
          <div class="grid-3" id="relatedGrid"></div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem">
          <div class="footer-logo">Obt★Star</div>
          <div style="display:flex;gap:2rem;font-size:0.875rem">
            <a href="index.html" style="color:rgba(255,255,255,0.55)">首页</a>
            <a href="reports.html" style="color:rgba(255,255,255,0.55)">报告库</a>
            <a href="about.html" style="color:rgba(255,255,255,0.55)">关于</a>
          </div>
        </div>
        <div class="footer-bottom"><div>© 2026 ObtStar · All rights reserved</div></div>
      </div>
    </footer>
  </div>

  <!-- AOS 动画库 -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <!-- API 客户端 -->
  <script src="js/api-client.js"></script>
  <!-- 主题管理器 -->
  <script src="js/theme-manager.js"></script>
  <!-- 书签系统 -->
  <script src="js/bookmarks.js"></script>

  <script>
    AOS.init({ duration: 650, easing: 'ease-out-cubic', once: true, offset: 50 });

    // 主题切换按钮绑定
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        document.dispatchEvent(new CustomEvent('theme-toggle'));
      });
    }

    function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
      const progress = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
      document.getElementById('readingProgress').style.width = progress + '%';
    });

    // 状态
    let report = null;
    let category = null;
    let categories = [];

    // 获取 URL 参数
    const urlParams = new URLSearchParams(window.location.search);
    const reportId = urlParams.get('id');

    // 初始化
    async function initPage() {
      if (!reportId) {
        showError('缺少报告 ID');
        return;
      }

      try {
        // 并行加载数据
        const [reportRes, categoriesRes] = await Promise.all([
          ObtStarAPI.getReportById(reportId),
          ObtStarAPI.getCategoriesCached()
        ]);

        report = reportRes.data;
        categories = categoriesRes.data;
        category = categories.find(c => c.id === report.category) || categories[0];

        renderPage();
        showContent();
      } catch (error) {
        console.error('加载失败:', error);
        showError('无法加载报告数据，请检查网络连接');
      }
    }

    function showContent() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }

    function showError(message) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorMessage').textContent = message;
    }

    function renderPage() {
      // 设置主题色
      document.documentElement.style.setProperty('--report-color', report.color || '#4F46E5');
      document.documentElement.style.setProperty('--report-color-2', '#7C3AED');

      // 页面标题
      document.title = `${report.title} · ObtStar`;

      // Hero 区域
      document.getElementById('breadcrumbTitle').textContent = report.title;
      document.getElementById('heroGlow').style.background = `radial-gradient(circle, ${report.color || '#4F46E5'}, transparent)`;
      document.getElementById('heroCategoryBadge').innerHTML = `
        <span class="tag" style="background:${report.color||'#4F46E5'}18;color:${report.color||'#4F46E5'};font-size:0.8125rem">
          ${category.icon} ${category.name}
        </span>
        ${report.featured ? '<span class="badge badge-featured" style="margin-left:0.375rem">⭐ 精选</span>' : ''}
      `;
      document.getElementById('heroTitle').textContent = report.title;
      document.getElementById('heroSubtitle').textContent = report.subtitle;
      document.getElementById('heroTags').innerHTML = report.tags.map(t => `<span class="tag">${t}</span>`).join('');
      document.getElementById('readerModeBtn').href = `reader.html?id=${reportId}`;

      // 快速统计
      document.getElementById('quickStats').innerHTML = `
        <div style="font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:1rem">报告信息</div>
        <div style="display:flex;flex-direction:column;gap:0.75rem">
          <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem">
            <span style="color:var(--text-muted)"><i class="fa fa-file-alt" style="width:16px"></i> 总页数</span>
            <strong>${report.pages} 页</strong>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem">
            <span style="color:var(--text-muted)"><i class="fa fa-calendar" style="width:16px"></i> 发布日期</span>
            <strong>${report.date}</strong>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem">
            <span style="color:var(--text-muted)"><i class="fa fa-user" style="width:16px"></i> 来源</span>
            <strong style="text-align:right;max-width:120px">${report.source}</strong>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem">
            <span style="color:var(--text-muted)"><i class="fa fa-list" style="width:16px"></i> 章节数</span>
            <strong>${report.chapters.length} 章</strong>
          </div>
        </div>
      `;

      // 封面
      document.getElementById('reportCover').style.background =
        `linear-gradient(135deg, ${report.color||'#4F46E5'}dd, ${report.color||'#7C3AED'}cc, #1E1B4B)`;
      document.getElementById('coverIcon').textContent = category.icon;
      document.getElementById('coverTitle').textContent = report.title;
      document.getElementById('coverSub').textContent = report.subtitle;

      // 信息面板
      document.getElementById('infoPanelHeader').style.background =
        `linear-gradient(135deg, ${report.color||'#4F46E5'}, #7C3AED)`;
      document.getElementById('infoPanelIcon').textContent = category.icon;
      document.getElementById('infoPanelCat').textContent = category.name;
      document.getElementById('infoPanelList').innerHTML = `
        <li class="info-panel-item"><span class="info-panel-label">标题</span><span class="info-panel-value">${report.title}</span></li>
        <li class="info-panel-item"><span class="info-panel-label">页数</span><span class="info-panel-value">${report.pages} 页</span></li>
        <li class="info-panel-item"><span class="info-panel-label">发布</span><span class="info-panel-value">${report.date}</span></li>
        <li class="info-panel-item"><span class="info-panel-label">来源</span><span class="info-panel-value">${report.source}</span></li>
        <li class="info-panel-item"><span class="info-panel-label">章节</span><span class="info-panel-value">${report.chapters.length} 章</span></li>
        <li class="info-panel-item"><span class="info-panel-label">标签</span><span class="info-panel-value">${report.tags.length} 个</span></li>
      `;

      // 摘要
      document.getElementById('summaryText').textContent = report.summary;

      // 核心亮点
      document.getElementById('highlightsList').innerHTML = report.highlights.map((h, i) => `
        <div class="highlight-item" data-aos="fade-left" data-aos-delay="${i * 60}">
          <span class="hi-icon"><i class="fa fa-check-circle"></i></span>
          <span>${h}</span>
        </div>
      `).join('');

      // 章节目录
      document.getElementById('chaptersList').innerHTML = report.chapters.map((ch, i) => `
        <div class="chapter-item" data-aos="fade-up" data-aos-delay="${i * 50}">
          <div class="chapter-num">${String(i+1).padStart(2,'0')}</div>
          <div>
            <div style="font-weight:600;color:var(--text-title);margin-bottom:0.25rem">${ch.title}</div>
            <div style="font-size:0.875rem;color:var(--text-muted)">${ch.desc}</div>
          </div>
        </div>
      `).join('');

      // 标签
      document.getElementById('allTagsList').innerHTML = report.tags.map(t =>
        `<a href="reports.html?cat=${report.category}" class="tag" style="font-size:0.875rem;padding:0.35rem 0.875rem">${t}</a>`
      ).join('');

      // 右侧目录
      document.getElementById('tocList').innerHTML = report.chapters.map((ch, i) => `
        <div class="toc-item" onclick="scrollToChapter(${i})">
          <span class="toc-num">${String(i+1).padStart(2,'0')}</span>
          <span>${ch.title}</span>
        </div>
      `).join('');
      document.getElementById('tocList').insertAdjacentHTML('afterbegin', `
        <div class="toc-item active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
          <span class="toc-num">—</span><span>报告摘要</span>
        </div>
        <div class="toc-item" onclick="document.querySelector('#highlightsList').scrollIntoView({behavior:'smooth',block:'start'})">
          <span class="toc-num">—</span><span>核心亮点</span>
        </div>
      `);

      // 加载相关推荐
      loadRelatedReports();
    }

    async function loadRelatedReports() {
      try {
        const { data: allReports } = await ObtStarAPI.getReportsCached();
        const related = allReports
          .filter(r => r.id !== report.id && r.category === report.category)
          .concat(allReports.filter(r => r.id !== report.id && r.category !== report.category))
          .slice(0, 3);

        document.getElementById('relatedGrid').innerHTML = related.map((r, i) => {
          const rc = categories.find(c => c.id === r.category);
          return `
            <div class="report-card" onclick="location.href='report-detail.html?id=${r.id}'" data-aos="fade-up" data-aos-delay="${i*80}">
              <div class="report-card-accent" style="background:linear-gradient(to bottom,${r.color||'#4F46E5'},${r.color||'#7C3AED'})"></div>
              <div class="report-card-header">
                <div class="report-card-icon" style="background:linear-gradient(135deg,${r.color||'#4F46E5'}18,${r.color||'#7C3AED'}28);font-size:1.5rem">
                  ${rc ? rc.icon : '📄'}
                </div>
                <div style="flex:1;padding-left:0.75rem">
                  <div class="report-card-title">${r.title}</div>
                  <div class="report-card-subtitle">${r.subtitle}</div>
                </div>
              </div>
              <p class="report-card-summary">${r.summary}</p>
              <div class="report-card-meta">
                <span class="meta-item"><i class="fa fa-file-alt"></i> ${r.pages} 页</span>
                <span class="meta-item"><i class="fa fa-calendar"></i> ${r.date}</span>
              </div>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('加载相关推荐失败:', error);
      }
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = event.target.closest('button');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fa fa-check"></i> 已复制!';
        btn.style.background = 'var(--accent2)';
        btn.style.color = 'white';
        setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; btn.style.color = ''; }, 2000);
      });
    }

    function shareTwitter() {
      const text = encodeURIComponent(`${report.title} - ${report.subtitle}`);
      const url = encodeURIComponent(window.location.href);
      window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    }

    function scrollToChapter(index) {
      const chapters = document.querySelectorAll('.chapter-item');
      if (chapters[index]) {
        chapters[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    // 启动
    initPage();
  </script>
</body>
</html>
