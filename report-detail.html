<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报告详情 · ObtStar</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <style>
    .detail-hero {
      padding: 6rem 0 4rem;
      position: relative;
      overflow: hidden;
    }
    .detail-hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.06;
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, #4F46E5 1px, transparent 1px),
        linear-gradient(to bottom, #4F46E5 1px, transparent 1px);
    }
    .detail-hero-glow {
      position: absolute;
      top: -80px; right: -80px;
      width: 500px; height: 500px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      background: radial-gradient(circle, var(--report-color, #4F46E5), transparent);
      z-index: 0;
    }
    .detail-hero-content { position: relative; z-index: 1; }

    .detail-layout {
      display: grid;
      grid-template-columns: 240px 1fr 220px;
      gap: 2.5rem;
      align-items: start;
    }
    @media (max-width: 1100px) {
      .detail-layout { grid-template-columns: 1fr; }
      .detail-toc { display: none; }
    }
    @media (max-width: 768px) {
      .detail-sidebar-left { display: none; }
    }

    /* 左侧信息面板 */
    .info-panel {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: sticky;
      top: 88px;
    }
    .info-panel-header {
      padding: 1.25rem;
      background: linear-gradient(135deg, var(--report-color, #4F46E5), var(--report-color-2, #7C3AED));
      color: white;
      text-align: center;
    }
    .info-panel-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .info-panel-list { padding: 0; list-style: none; }
    .info-panel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }
    .info-panel-item:last-child { border-bottom: none; }
    .info-panel-label { color: var(--text-muted); }
    .info-panel-value { font-weight: 600; color: var(--text-title); text-align: right; max-width: 120px; }

    /* 主内容区 */
    .detail-main {
      min-width: 0;
    }
    .detail-section {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .detail-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-title);
      margin-bottom: 1.25rem;
      padding-bottom: 0.875rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }
    .detail-section-title .ds-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--report-color,#4F46E5)18, var(--report-color,#4F46E5)28);
      font-size: 0.875rem;
    }

    /* 摘要 */
    .summary-text {
      font-size: 1.0625rem;
      color: var(--text-body);
      line-height: 2;
    }

    /* 相关推荐 */
    .related-card {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
      margin-bottom: 0.75rem;
      background: var(--bg-white);
    }
    .related-card:hover { border-color: var(--primary); transform: translateX(4px); }
    .related-card:last-child { margin-bottom: 0; }

    /* 分享栏 */
    .share-bar {
      display: flex;
      gap: 0.625rem;
      flex-wrap: wrap;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-body);
      transition: all 0.2s ease;
    }
    .share-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(79,70,229,0.05); }

    /* 报告封面大图 */
    .report-cover {
      width: 100%;
      aspect-ratio: 16/7;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .cover-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .cover-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
      padding: 2rem;
    }
    .cover-icon { font-size: 4rem; margin-bottom: 0.875rem; }
    .cover-title { font-size: clamp(1.25rem, 3vw, 2rem); font-weight: 800; line-height: 1.3; }
    .cover-sub { font-size: 0.95rem; opacity: 0.8; margin-top: 0.5rem; }

    /* 右侧目录 */
    .detail-toc .toc-nav { top: 88px; }

    /* 完整报告阅读区域 */
    .full-report-section {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .full-report-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .full-report-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-title);
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }
    .full-report-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      background: linear-gradient(135deg, var(--report-color, #4F46E5), var(--report-color-2, #7C3AED));
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .full-report-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
    }
    .full-report-toggle.loaded {
      background: linear-gradient(135deg, #10B981, #059669);
    }

    /* 完整内容展示 */
    .full-content-wrapper {
      display: none;
    }
    .full-content-wrapper.active {
      display: block;
    }
    .content-loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .content-loading i {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--primary);
    }

    /* 章节内容样式 */
    .content-section {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px dashed var(--border);
    }
    .content-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .content-section h2 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text-title);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--report-color, #4F46E5);
      display: inline-block;
    }
    .content-section h3 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-title);
      margin: 1.5rem 0 0.875rem;
    }
    .content-section p {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--text-body);
      margin-bottom: 1rem;
      text-align: justify;
    }
    .content-section ul, .content-section ol {
      margin: 1rem 0;
      padding-left: 1.5rem;
    }
    .content-section li {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text-body);
      margin-bottom: 0.5rem;
    }
    .content-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.25rem 0;
      font-size: 0.9375rem;
    }
    .content-section th, .content-section td {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      text-align: left;
    }
    .content-section th {
      background: var(--bg-gray);
      font-weight: 600;
      color: var(--text-title);
    }
    .content-section tr:nth-child(even) {
      background: var(--bg-gray);
    }

    /* 分页控件 */
    .content-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .page-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 40px;
      padding: 0 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: white;
      color: var(--text-body);
      font-size: 0.9375rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(79, 70, 229, 0.05);
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .page-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .page-info {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0 0.5rem;
    }

    /* 移动端优化 */
    @media (max-width: 768px) {
      .full-report-header {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
      .content-section h2 {
        font-size: 1.25rem;
      }
      .content-section h3 {
        font-size: 1.0625rem;
      }
    }

    /* 打印内容区域样式 */
    .print-content-area {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: white;
      z-index: 9999;
      overflow-y: auto;
      padding: 2rem;
    }
    
    .print-loading {
      text-align: center;
      padding: 4rem;
      font-size: 1.125rem;
      color: #6B7280;
    }
    
    .print-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid #E5E7EB;
    }
    
    .print-header h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      color: #1F2937;
    }
    
    .print-subtitle {
      font-size: 1.125rem;
      color: #4B5563;
      margin-bottom: 0.5rem;
    }
    
    .print-meta {
      font-size: 0.875rem;
      color: #6B7280;
    }
    
    .print-body {
      max-width: 800px;
      margin: 0 auto;
      font-size: 11pt;
      line-height: 1.7;
      color: #1F2937;
    }
    
    .print-body h2 {
      font-size: 1.375rem;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: #1F2937;
      break-after: avoid;
    }
    
    .print-body h3 {
      font-size: 1.125rem;
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
      color: #374151;
      break-after: avoid;
    }
    
    .print-body p {
      margin-bottom: 0.75rem;
    }
    
    .print-body ul, .print-body ol {
      margin-bottom: 0.75rem;
      padding-left: 1.5rem;
    }
    
    .print-body li {
      margin-bottom: 0.25rem;
    }
    
    /* 打印时隐藏页面元素 */
    @media print {
      body > *:not(.print-content-area) {
        display: none !important;
      }
      
      .print-content-area {
        display: block !important;
        position: static !important;
        overflow: visible !important;
        padding: 0 !important;
      }
      
      .print-body {
        max-width: 100% !important;
      }
      
      /* 图表打印样式 */
      .chart-container {
        break-inside: avoid;
        page-break-inside: avoid;
        border: 1px solid #ccc !important;
        margin: 1rem 0 !important;
      }
      
      .flow-step {
        background: #4F46E5 !important;
        color: white !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      
      .risk-bar::before {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    /* 语言切换器样式 */
    .lang-switcher {
      position: relative;
      display: inline-block;
    }
    
    .lang-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text-title);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .lang-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .lang-menu {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 0.5rem;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      min-width: 150px;
      display: none;
      z-index: 100;
    }
    
    .lang-menu.active {
      display: block;
    }
    
    .lang-option {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      text-align: left;
      background: none;
      border: none;
      font-size: 0.9375rem;
      color: var(--text-body);
      cursor: pointer;
      transition: background 0.15s ease;
    }
    
    .lang-option:hover {
      background: #F3F4F6;
    }
    
    .lang-option.active {
      background: #EEF2FF;
      color: var(--accent);
      font-weight: 500;
    }
    
    .lang-option:first-child {
      border-radius: 8px 8px 0 0;
    }
    
    .lang-option:last-child {
      border-radius: 0 0 8px 8px;
    }
  </style>
</head>
<body class="page-body">

  <div class="reading-progress" id="readingProgress" style="width:0%"></div>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;width:100%">
      <a href="index.html" class="logo">Obt<span>★</span>Star</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">首页</a></li>
        <li><a href="reports.html" class="active">研究报告</a></li>
        <li><a href="about.html">关于</a></li>
        <li><a href="reports.html" class="nav-cta">浏览全部 →</a></li>
      </ul>
      <div class="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <!-- 详情 Hero -->
  <div class="detail-hero" id="detailHero" style="background:linear-gradient(160deg,#EEF2FF 0%,#F8FAFC 50%,#EDE9FE 100%)">
    <div class="detail-hero-bg"></div>
    <div class="detail-hero-glow" id="heroGlow"></div>
    <div class="container detail-hero-content">
      <div class="breadcrumb" style="margin-bottom:1.5rem" data-aos="fade-right">
        <a href="index.html">首页</a>
        <span class="sep">/</span>
        <a href="reports.html">研究报告</a>
        <span class="sep">/</span>
        <span id="breadcrumbTitle" style="color:var(--text-title)">报告详情</span>
      </div>
      <div style="display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:1;min-width:280px" data-aos="fade-right">
          <div id="heroCategoryBadge" style="margin-bottom:1rem"></div>
          <h1 id="heroTitle" style="margin-bottom:0.625rem">加载中…</h1>
          <p id="heroSubtitle" style="font-size:1.0625rem;color:var(--text-body);margin-bottom:1.5rem"></p>
          <div id="heroTags" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:2rem"></div>
          <div style="display:flex;gap:1rem;flex-wrap:wrap">
            <button onclick="copyLink()" class="btn btn-primary"><i class="fa fa-share-alt"></i> 分享报告</button>
            <div id="langSwitcher" class="lang-switcher" style="display:none">
              <button class="lang-btn" onclick="toggleLangMenu()">
                <i class="fa fa-globe"></i> <span id="currentLang">中文</span> <i class="fa fa-chevron-down"></i>
              </button>
              <div id="langMenu" class="lang-menu"></div>
            </div>
            <a id="readerModeBtn" href="reader.html" class="btn btn-ghost"><i class="fa fa-book-reader"></i> 进入阅读模式</a>
            <a href="reports.html" class="btn btn-ghost"><i class="fa fa-arrow-left"></i> 返回列表</a>
          </div>

        <div id="quickStats" class="glass-panel" style="padding:1.5rem;min-width:240px;max-width:320px" data-aos="fade-left">
          <!-- 由 JS 填充 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 详情主体 -->
  <section class="section-sm">
    <div class="container">
      <div class="detail-layout">

        <!-- ── 左侧信息面板 ── -->

          <div class="info-panel">

        <!-- ── 主内容 ── -->

        <div class="section-header" style="margin-bottom:1.5rem">
          <span class="section-label">延伸阅读</span>
          <h2 class="section-title" style="margin-top:0.5rem;font-size:1.75rem">相关报告推荐</h2>
        </div>
        <div class="grid-3" id="relatedGrid">
          <!-- 由 JS 填充 -->
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem">
        <div class="footer-logo">Obt★Star</div>
        <div style="display:flex;gap:2rem;font-size:0.875rem">
          <a href="index.html" style="color:rgba(255,255,255,0.55)">首页</a>
          <a href="reports.html" style="color:rgba(255,255,255,0.55)">报告库</a>
          <a href="about.html" style="color:rgba(255,255,255,0.55)">关于</a>
        </div>
      </div>
      <div class="footer-bottom"><div>© 2026 ObtStar · All rights reserved</div></div>
    </div>
  </footer>

  <script src="data/reports.js"></script>
  <script src="data/report-contents.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 650, easing: 'ease-out-cubic', once: true, offset: 50 });

    function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
      const progress = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
      document.getElementById('readingProgress').style.width = progress + '%';
    });

    // 获取报告数据
    const urlParams = new URLSearchParams(window.location.search);
    const reportId = urlParams.get('id') || REPORTS[0].id;
    const report = REPORTS.find(r => r.id === reportId) || REPORTS[0];
    const cat = CATEGORIES.find(c => c.id === report.category) || CATEGORIES[1];

    // ── 设置 CSS 变量（报告主题色）──
    document.documentElement.style.setProperty('--report-color', report.color || '#4F46E5');
    document.documentElement.style.setProperty('--report-color-2', '#7C3AED');

    // ── 填充 Hero ──
    document.title = `${report.title} · ObtStar`;
    document.getElementById('breadcrumbTitle').textContent = report.title;
    document.getElementById('heroGlow').style.background = `radial-gradient(circle, ${report.color || '#4F46E5'}, transparent)`;
    document.getElementById('heroCategoryBadge').innerHTML = `
      <span class="tag" style="background:${report.color||'#4F46E5'}18;color:${report.color||'#4F46E5'};font-size:0.8125rem">
        ${cat.icon} ${cat.name}
      </span>
      ${report.featured ? '<span class="badge badge-featured" style="margin-left:0.375rem">⭐ 精选</span>' : ''}
    `;
    document.getElementById('heroTitle').textContent = report.title;
    document.getElementById('heroSubtitle').textContent = report.subtitle;
    document.getElementById('heroTags').innerHTML = report.tags.map(t => `<span class="tag">${t}</span>`).join('');
    
    // 设置阅读模式按钮链接
    document.getElementById('readerModeBtn').href = `reader.html?id=${reportId}`;

    // ── 多语言支持初始化 ──
    let currentLang = 'zh';
    if (report.multilingual && report.multilingual.enabled) {
      const langSwitcher = document.getElementById('langSwitcher');
      const langMenu = document.getElementById('langMenu');
      const currentLangSpan = document.getElementById('currentLang');
      
      // 显示语言切换器
      langSwitcher.style.display = 'inline-block';
      
      // 生成语言选项
      langMenu.innerHTML = report.multilingual.languages.map(lang => `
        <button class="lang-option ${lang.code === currentLang ? 'active' : ''}" 
                onclick="switchLanguage('${lang.code}')" 
                data-lang="${lang.code}">
          ${lang.name}
        </button>
      `).join('');
      
      // 从URL参数获取语言设置
      const langParam = urlParams.get('lang');
      if (langParam && report.multilingual.languages.find(l => l.code === langParam)) {
        currentLang = langParam;
        updateLanguageUI(currentLang);
      }
    }
    
    // 切换语言菜单显示
    function toggleLangMenu() {
      document.getElementById('langMenu').classList.toggle('active');
    }
    
    // 点击外部关闭语言菜单
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.lang-switcher')) {
        document.getElementById('langMenu').classList.remove('active');
      }
    });
    
    // 切换语言
    function switchLanguage(langCode) {
      currentLang = langCode;
      updateLanguageUI(langCode);
      
      // 更新URL参数
      const newUrl = new URL(window.location.href);
      newUrl.searchParams.set('lang', langCode);
      window.history.replaceState({}, '', newUrl);
      
      // 关闭菜单
      document.getElementById('langMenu').classList.remove('active');
      
      // 如果全文阅读区域已展开，重新加载内容
      const fullContentWrapper = document.getElementById('fullContentWrapper');
      if (fullContentWrapper && fullContentWrapper.classList.contains('active')) {
        loadReportContent();
      }
      
      // 如果打印区域已加载，重新加载
      const printArea = document.getElementById('printContentArea');
      if (printArea && printArea.style.display === 'block') {
        printReport();
      }
    }
    
    // 更新语言UI
    function updateLanguageUI(langCode) {
      const lang = report.multilingual.languages.find(l => l.code === langCode);
      if (lang) {
        document.getElementById('currentLang').textContent = lang.name;
      }
      
      // 更新语言选项高亮
      document.querySelectorAll('.lang-option').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === langCode);
      });
    }

    // 快速统计
    document.getElementById('quickStats').innerHTML = `
      <div style="font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:1rem">报告信息</div>
      <div style="display:flex;flex-direction:column;gap:0.75rem">
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem">
          <span style="color:var(--text-muted)"><i class="fa fa-file-alt" style="width:16px"></i> 总页数</span>
          <strong>${report.pages} 页</strong>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem">
          <span style="color:var(--text-muted)"><i class="fa fa-calendar" style="width:16px"></i> 发布日期</span>
          <strong>${report.date}</strong>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem">
          <span style="color:var(--text-muted)"><i class="fa fa-user" style="width:16px"></i> 来源</span>
          <strong style="text-align:right;max-width:120px">${report.source}</strong>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem">
          <span style="color:var(--text-muted)"><i class="fa fa-list" style="width:16px"></i> 章节数</span>
          <strong>${report.chapters.length} 章</strong>
        </div>
      </div>
    `;

    // ── 封面 ──
    document.getElementById('reportCover').style.background =
      `linear-gradient(135deg, ${report.color||'#4F46E5'}dd, ${report.color||'#7C3AED'}cc, #1E1B4B)`;
    document.getElementById('coverIcon').textContent = cat.icon;
    document.getElementById('coverTitle').textContent = report.title;
    document.getElementById('coverSub').textContent = report.subtitle;

    // ── 信息面板 ──
    document.getElementById('infoPanelHeader').style.background =
      `linear-gradient(135deg, ${report.color||'#4F46E5'}, #7C3AED)`;
    document.getElementById('infoPanelIcon').textContent = cat.icon;
    document.getElementById('infoPanelCat').textContent = cat.name;
    document.getElementById('infoPanelList').innerHTML = `
      <li class="info-panel-item"><span class="info-panel-label">标题</span><span class="info-panel-value">${report.title}</span></li>
      <li class="info-panel-item"><span class="info-panel-label">页数</span><span class="info-panel-value">${report.pages} 页</span></li>
      <li class="info-panel-item"><span class="info-panel-label">发布</span><span class="info-panel-value">${report.date}</span></li>
      <li class="info-panel-item"><span class="info-panel-label">来源</span><span class="info-panel-value">${report.source}</span></li>
      <li class="info-panel-item"><span class="info-panel-label">章节</span><span class="info-panel-value">${report.chapters.length} 章</span></li>
      <li class="info-panel-item"><span class="info-panel-label">标签</span><span class="info-panel-value">${report.tags.length} 个</span></li>
    `;

    // ── 摘要 ──
    document.getElementById('summaryText').textContent = report.summary;

    // ── 核心亮点 ──
    document.getElementById('highlightsList').innerHTML = report.highlights.map((h, i) => `
      <div class="highlight-item" data-aos="fade-left" data-aos-delay="${i * 60}">
        <span class="hi-icon"><i class="fa fa-check-circle"></i></span>
        <span>${h}</span>
      </div>
    `).join('');

    // ── 章节目录 ──
    document.getElementById('chaptersList').innerHTML = report.chapters.map((ch, i) => `
      <div class="chapter-item" data-aos="fade-up" data-aos-delay="${i * 50}">
        <div class="chapter-num">${String(i+1).padStart(2,'0')}</div>
        <div>
          <div style="font-weight:600;color:var(--text-title);margin-bottom:0.25rem">${ch.title}</div>
          <div style="font-size:0.875rem;color:var(--text-muted)">${ch.desc}</div>
        </div>
      </div>
    `).join('');

    // ── 标签 ──
    document.getElementById('allTagsList').innerHTML = report.tags.map(t =>
      `<a href="reports.html?cat=${report.category}" class="tag" style="font-size:0.875rem;padding:0.35rem 0.875rem">${t}</a>`
    ).join('');

    // ── 右侧目录 ──
    document.getElementById('tocList').innerHTML = report.chapters.map((ch, i) => `
      <div class="toc-item" onclick="scrollToChapter(${i})">
        <span class="toc-num">${String(i+1).padStart(2,'0')}</span>
        <span>${ch.title}</span>
      </div>
    `).join('');
    // 追加"摘要"、"亮点"入口
    document.getElementById('tocList').insertAdjacentHTML('afterbegin', `
      <div class="toc-item active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <span class="toc-num">—</span><span>报告摘要</span>
      </div>
      <div class="toc-item" onclick="document.querySelector('#highlightsList').scrollIntoView({behavior:'smooth',block:'start'})">
        <span class="toc-num">—</span><span>核心亮点</span>
      </div>
    `);

    // ── 相关推荐 ──
    const related = REPORTS.filter(r => r.id !== report.id && r.category === report.category)
      .concat(REPORTS.filter(r => r.id !== report.id && r.category !== report.category))
      .slice(0, 3);
    document.getElementById('relatedGrid').innerHTML = related.map((r, i) => {
      const rc = CATEGORIES.find(c => c.id === r.category);
      return `
        <div class="report-card" onclick="location.href='report-detail.html?id=${r.id}'" data-aos="fade-up" data-aos-delay="${i*80}">
          <div class="report-card-accent" style="background:linear-gradient(to bottom,${r.color||'#4F46E5'},${r.color||'#7C3AED'})"></div>
          <div class="report-card-header">
            <div class="report-card-icon" style="background:linear-gradient(135deg,${r.color||'#4F46E5'}18,${r.color||'#7C3AED'}28);font-size:1.5rem">
              ${rc ? rc.icon : '📄'}
            </div>
            <div style="flex:1;padding-left:0.75rem">
              <div class="report-card-title">${r.title}</div>
              <div class="report-card-subtitle">${r.subtitle}</div>
            </div>
          </div>
          <p class="report-card-summary">${r.summary}</p>
          <div class="report-card-meta">
            <span class="meta-item"><i class="fa fa-file-alt"></i> ${r.pages} 页</span>
            <span class="meta-item"><i class="fa fa-calendar"></i> ${r.date}</span>
          </div>
        </div>
      `;
    }).join('');

    // ── 工具函数 ──
    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = event.target.closest('button');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fa fa-check"></i> 已复制!';
        btn.style.background = 'var(--accent2)';
        btn.style.color = 'white';
        setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; btn.style.color = ''; }, 2000);
      });
    }
    function shareTwitter() {
      const text = encodeURIComponent(`推荐阅读：${report.title} - ${report.subtitle} | ObtStar`);
      window.open(`https://x.com/intent/tweet?text=${text}&url=${encodeURIComponent(window.location.href)}`, '_blank');
    }

    // 打印报告 - 在当前页面加载内容并打印
    async function printReport() {
      // 创建打印内容区域
      let printArea = document.getElementById('printContentArea');
      if (!printArea) {
        printArea = document.createElement('div');
        printArea.id = 'printContentArea';
        printArea.className = 'print-content-area';
        document.body.appendChild(printArea);
      }
      
      // 显示加载状态
      printArea.innerHTML = '<div class="print-loading">正在加载报告内容...</div>';
      printArea.style.display = 'block';
      
      try {
        // 加载报告内容
        const content = await loadReportContentForPrint();
        printArea.innerHTML = content;
        
        // 触发打印
        setTimeout(() => {
          window.print();
          // 打印完成后隐藏打印区域
          setTimeout(() => {
            printArea.style.display = 'none';
          }, 1000);
        }, 500);
      } catch (error) {
        console.error('加载打印内容失败:', error);
        printArea.innerHTML = '<div class="print-loading">加载失败，请重试</div>';
      }
    }
    
    // 加载报告内容用于打印
    async function loadReportContentForPrint() {
      // 加载清单
      const manifestResponse = await fetch(`data/reports-content/${reportId}/manifest.json`);
      const manifest = await manifestResponse.json();
      
      let allSections = [];
      
      // 加载所有分块
      for (let i = 0; i < manifest.totalChunks; i++) {
        const chunkResponse = await fetch(`data/reports-content/${reportId}/chunk-${i}.js`);
        const jsCode = await chunkResponse.text();
        
        // 执行JS代码
        const script = document.createElement('script');
        script.textContent = jsCode;
        document.head.appendChild(script);
        
        // 获取内容
        const chunkKey = `REPORT_CHUNK_${reportId.replace(/-/g, '_')}_${i}`;
        const chunk = window[chunkKey];
        
        if (chunk && chunk.sections) {
          allSections = allSections.concat(chunk.sections);
        }
      }
      
      // 根据当前语言过滤内容
      if (currentLang !== 'bilingual' && report.multilingual && report.multilingual.enabled) {
        allSections = filterSectionsByLanguage(allSections, currentLang);
      }
      
      // 生成HTML内容
      let html = `
        <div class="print-header">
          <h1>${report.title}</h1>
          <p class="print-subtitle">${report.subtitle}</p>
          <p class="print-meta">来源: ${report.source} | 发布日期: ${report.date}</p>
        </div>
        <div class="print-body">
      `;
      
      allSections.forEach((section, idx) => {
        const tag = section.level === 1 ? 'h2' : 'h3';
        html += `
          <${tag}>${section.title}</${tag}>
          ${section.content}
        `;
      });
      
      html += '</div>';
      return html;
    }
    function scrollToChapter(i) {
      const items = document.querySelectorAll('.chapter-item');
      if (items[i]) items[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── 完整报告阅读功能 ──
    let currentPage = 1;
    const itemsPerPage = 3; // 每页显示的章节数
    let reportContent = null;

    function toggleFullReport() {
      const wrapper = document.getElementById('fullContentWrapper');
      const btn = document.getElementById('fullReportBtn');
      
      if (wrapper.classList.contains('active')) {
        wrapper.classList.remove('active');
        btn.innerHTML = '<i class="fa fa-book-open"></i> 点击展开阅读';
        btn.classList.remove('loaded');
      } else {
        wrapper.classList.add('active');
        btn.innerHTML = '<i class="fa fa-check"></i> 已加载';
        btn.classList.add('loaded');
        
        // 首次加载内容
        if (!reportContent) {
          loadReportContent();
        }
        
        // 滚动到内容区域
        setTimeout(() => {
          wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      }
    }

    function loadReportContent() {
      const loading = document.getElementById('contentLoading');
      const contentBody = document.getElementById('fullContentBody');
      const pagination = document.getElementById('contentPagination');
      
      // 显示加载状态
      loading.style.display = 'block';
      contentBody.style.display = 'none';
      
      // 模拟加载延迟
      setTimeout(() => {
        // 获取当前报告的内容数据
        reportContent = REPORT_CONTENTS[reportId];
        
        if (!reportContent) {
          loading.innerHTML = '<i class="fa fa-exclamation-circle"></i><p>暂无完整内容</p>';
          return;
        }
        
        // 根据当前语言过滤内容
        let sections = reportContent.sections;
        if (currentLang !== 'bilingual' && report.multilingual && report.multilingual.enabled) {
          sections = filterSectionsByLanguage(sections, currentLang);
        }
        
        // 更新 reportContent 用于渲染
        reportContent = {
          ...reportContent,
          sections: sections
        };
        
        loading.style.display = 'none';
        contentBody.style.display = 'block';
        pagination.style.display = 'flex';
        
        renderPage(1);
      }, 500);
    }
    
    // 根据语言过滤章节
    function filterSectionsByLanguage(sections, lang) {
      return sections.filter(section => {
        // 如果章节没有指定语言，默认显示
        if (!section.lang) return true;
        
        // 如果章节有语言标记，匹配当前语言
        if (section.lang === lang) return true;
        
        // 双语模式下显示所有
        if (lang === 'bilingual') return true;
        
        return false;
      });
    }

    function renderPage(page) {
      currentPage = page;
      const contentBody = document.getElementById('fullContentBody');
      const pageInfo = document.getElementById('pageInfo');
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      
      if (!reportContent || !reportContent.sections) {
        contentBody.innerHTML = '<p style="text-align:center;color:var(--text-muted)">暂无内容数据</p>';
        return;
      }
      
      const sections = reportContent.sections;
      const totalPages = Math.ceil(sections.length / itemsPerPage);
      
      const startIdx = (page - 1) * itemsPerPage;
      const endIdx = Math.min(startIdx + itemsPerPage, sections.length);
      const pageSections = sections.slice(startIdx, endIdx);
      
      // 渲染内容
      let html = '';
      pageSections.forEach(section => {
        const levelClass = section.level === 1 ? 'h2' : 'h3';
        const contentHtml = formatContent(section.content);
        
        html += `
          <div class="content-section" data-section="${section.title}">
            <${levelClass}>${section.title}</${levelClass}>
            ${contentHtml}
          </div>
        `;
      });
      
      contentBody.innerHTML = html;
      
      // 更新分页信息
      pageInfo.textContent = `${page} / ${totalPages}`;
      prevBtn.disabled = page === 1;
      nextBtn.disabled = page === totalPages;
      
      // 更新按钮状态
      document.querySelectorAll('.page-btn').forEach(btn => {
        if (!btn.disabled && btn.onclick) {
          // 重新绑定事件
        }
      });
    }

    function formatContent(text) {
      if (!text) return '';
      
      let html = text;
      
      // 处理表格（简化处理：将 | 分隔的内容转为表格）
      if (html.includes('|')) {
        const lines = html.split('\n');
        let tableHtml = '';
        let inTable = false;
        
        lines.forEach((line, idx) => {
          if (line.includes('|') && line.trim().startsWith('|')) {
            if (!inTable) {
              tableHtml += '<table>';
              inTable = true;
            }
            
            const cells = line.split('|').filter(c => c.trim());
            const isHeader = idx === 0 || line.includes('---');
            
            if (isHeader && idx === 0) {
              tableHtml += '<thead><tr>';
              cells.forEach(cell => {
                tableHtml += `<th>${cell.trim()}</th>`;
              });
              tableHtml += '</tr></thead><tbody>';
            } else if (!line.includes('---')) {
              tableHtml += '<tr>';
              cells.forEach(cell => {
                tableHtml += `<td>${cell.trim()}</td>`;
              });
              tableHtml += '</tr>';
            }
          } else {
            if (inTable) {
              tableHtml += '</tbody></table>';
              inTable = false;
            }
            if (line.trim()) {
              tableHtml += `<p>${line}</p>`;
            }
          }
        });
        
        if (inTable) {
          tableHtml += '</tbody></table>';
        }
        
        // 检查是否有实际表格内容
        if (tableHtml.includes('<th>')) {
          html = tableHtml;
        }
      }
      
      // 处理列表项
      if (html.includes('•') || html.includes('·')) {
        const lines = html.split('\n');
        let listHtml = '';
        let inList = false;
        
        lines.forEach(line => {
          if (line.trim().startsWith('•') || line.trim().startsWith('·')) {
            if (!inList) {
              listHtml += '<ul>';
              inList = true;
            }
            listHtml += `<li>${line.replace(/^[•·]\s*/, '')}</li>`;
          } else {
            if (inList) {
              listHtml += '</ul>';
              inList = false;
            }
            if (line.trim()) {
              listHtml += `<p>${line}</p>`;
            }
          }
        });
        
        if (inList) {
          listHtml += '</ul>';
        }
        
        if (listHtml) {
          html = listHtml;
        }
      }
      
      // 处理段落（如果没有列表和表格）
      if (!html.includes('<ul>') && !html.includes('<table>')) {
        html = html.split('\n\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
      }
      
      // 清理多余的空行
      html = html.replace(/\n+/g, '');
      
      return html;
    }

    function changePage(delta) {
      if (!reportContent) return;
      
      const totalPages = Math.ceil(reportContent.sections.length / itemsPerPage);
      const newPage = currentPage + delta;
      
      if (newPage >= 1 && newPage <= totalPages) {
        renderPage(newPage);
        
        // 滚动到内容区域
        document.getElementById('fullContentWrapper').scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    }

    // 检查是否有完整内容可用
    function checkFullContentAvailable() {
      const btn = document.getElementById('fullReportBtn');
      const content = REPORT_CONTENTS[reportId];
      
      if (!content) {
        btn.innerHTML = '<i class="fa fa-info-circle"></i> 暂无完整内容';
        btn.disabled = true;
        btn.style.background = '#9CA3AF';
        btn.style.cursor = 'not-allowed';
      }
    }
    
    // 初始化检查
    checkFullContentAvailable();
  </script>
</body>
</html>
