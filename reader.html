<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>阅读报告 · ObtStar</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <style>
    /* 全屏阅读模式专用样式 */
    :root {
      --reader-bg: #FAFBFC;
      --reader-text: #1F2937;
      --reader-muted: #6B7280;
      --reader-border: #E5E7EB;
      --reader-accent: #4F46E5;
      --reader-sidebar-w: 280px;
      --reader-content-max: 720px;
    }

    /* 深色主题 */
    .theme-dark {
      --reader-bg: #111827;
      --reader-text: #F3F4F6;
      --reader-muted: #9CA3AF;
      --reader-border: #374151;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    
    body {
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--reader-bg);
      color: var(--reader-text);
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* 顶部工具栏 */
    .reader-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--reader-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 100;
      transition: all 0.3s ease;
    }
    .theme-dark .reader-header {
      background: rgba(17,24,39,0.92);
    }

    .reader-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .reader-logo {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
    }

    .reader-title {
      font-size: 0.9375rem;
      color: var(--reader-muted);
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reader-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .reader-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--reader-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .reader-btn:hover {
      background: rgba(79,70,229,0.1);
      color: var(--reader-accent);
    }
    
    .reader-btn.lang-btn {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--reader-muted);
    }
    .reader-btn.lang-btn:hover {
      background: rgba(79,70,229,0.15);
      color: var(--reader-accent);
    }
    .theme-dark .reader-btn.lang-btn {
      color: #9CA3AF;
    }
    .theme-dark .reader-btn.lang-btn:hover {
      color: #818CF8;
      background: rgba(129,140,248,0.15);
    }

    /* 阅读进度条 */
    .reader-progress-bar {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--reader-border);
      z-index: 99;
    }
    .reader-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4F46E5, #7C3AED);
      width: 0%;
      transition: width 0.1s ease;
    }

    /* 主内容区 */
    .reader-main {
      display: flex;
      min-height: 100vh;
      padding-top: 56px;
    }

    /* 左侧边栏 */
    .reader-sidebar {
      position: fixed;
      left: 0;
      top: 56px;
      bottom: 0;
      width: var(--reader-sidebar-w);
      background: var(--reader-bg);
      border-right: 1px solid var(--reader-border);
      overflow-y: auto;
      z-index: 50;
      transition: transform 0.3s ease;
    }

    .reader-sidebar-header {
      padding: 1.25rem 1.5rem;
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--reader-text);
      border-bottom: 1px solid var(--reader-border);
      position: sticky;
      top: 0;
      background: var(--reader-bg);
      z-index: 2;
    }

    .reader-toc {
      padding: 0.75rem 0;
    }

    .reader-toc-item {
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      color: var(--reader-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      border-left: 3px solid transparent;
    }
    .reader-toc-item:hover {
      background: rgba(79,70,229,0.05);
      color: var(--reader-text);
    }
    .reader-toc-item.active {
      background: rgba(79,70,229,0.1);
      color: var(--reader-accent);
      border-left-color: var(--reader-accent);
      font-weight: 500;
    }
    .reader-toc-item.lv2 {
      padding-left: 2.25rem;
      font-size: 0.8125rem;
    }
    .reader-toc-item.lv3 {
      padding-left: 3rem;
      font-size: 0.75rem;
    }

    /* 中间内容 */
    .reader-content-wrapper {
      flex: 1;
      margin-left: var(--reader-sidebar-w);
      padding: 2.5rem 2rem;
      display: flex;
      justify-content: center;
    }

    .reader-content {
      width: 100%;
      max-width: var(--reader-content-max);
    }

    .reader-article {
      font-size: 1.0625rem;
      line-height: 1.85;
    }

    .reader-article h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      color: var(--reader-text);
      line-height: 1.3;
    }

    .reader-article h2 {
      font-size: 1.375rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      color: var(--reader-text);
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--reader-accent);
    }

    .reader-article h3 {
      font-size: 1.125rem;
      font-weight: 600;
      margin: 2rem 0 0.75rem;
      color: var(--reader-text);
    }

    .reader-article p {
      margin-bottom: 1.25rem;
      text-align: justify;
    }

    .reader-article ul, .reader-article ol {
      margin: 1rem 0 1.25rem 1.5rem;
    }

    .reader-article li {
      margin-bottom: 0.5rem;
    }

    .reader-article table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9375rem;
    }

    .reader-article th, .reader-article td {
      padding: 0.75rem 1rem;
      border: 1px solid var(--reader-border);
      text-align: left;
    }

    .reader-article th {
      background: rgba(79,70,229,0.08);
      font-weight: 600;
    }

    .reader-article tr:nth-child(even) {
      background: rgba(0,0,0,0.02);
    }
    .theme-dark .reader-article tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    /* 阅读进度指示器（右侧） */
    .reader-progress-indicator {
      position: fixed;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 40;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--reader-border);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .progress-dot:hover {
      transform: scale(1.5);
    }
    .progress-dot.active {
      background: var(--reader-accent);
    }

    /* 分页导航 */
    .reader-pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--reader-border);
    }

    .reader-page-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border: 1px solid var(--reader-border);
      border-radius: 8px;
      background: var(--reader-bg);
      color: var(--reader-text);
      font-size: 0.9375rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .reader-page-btn:hover:not(:disabled) {
      border-color: var(--reader-accent);
      color: var(--reader-accent);
    }
    .reader-page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .reader-page-info {
      font-size: 0.875rem;
      color: var(--reader-muted);
    }

    /* 响应式 */
    @media (max-width: 1023px) {
      :root {
        --reader-sidebar-w: 0px;
      }
      
      .reader-sidebar {
        transform: translateX(-100%);
        width: 260px;
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
      }
      .reader-sidebar.open {
        transform: translateX(0);
      }
      
      .reader-content-wrapper {
        margin-left: 0;
        padding: 2rem 1.5rem;
      }
      
      .reader-title {
        max-width: 120px;
      }
      
      .reader-progress-indicator {
        display: none;
      }
      
      .reader-pagination {
        flex-direction: column;
        gap: 1rem;
      }
      
      .reader-page-btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* 边栏切换按钮（移动端） */
    .sidebar-toggle {
      display: none;
    }
    @media (max-width: 1023px) {
      .sidebar-toggle {
        display: flex;
      }
    }

    /* 字体大小控制 */
    .font-small .reader-article { font-size: 0.9375rem; }
    .font-medium .reader-article { font-size: 1.0625rem; }
    .font-large .reader-article { font-size: 1.25rem; }

    /* 加载动画 */
    .reader-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      color: var(--reader-muted);
    }
    .reader-loading i {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--reader-accent);
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 分块加载指示器 */
    .chunk-loading {
      text-align: center;
      padding: 2rem;
      color: var(--reader-muted);
    }
    .chunk-loading i {
      animation: spin 1s linear infinite;
      margin-right: 0.5rem;
    }

    /* 图表样式 */
    .chart-container {
      background: var(--reader-bg);
      border: 1px solid var(--reader-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      page-break-inside: avoid;
    }
    
    .chart-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--reader-text);
      margin-bottom: 1rem;
      text-align: center;
    }
    
    .chart-caption {
      font-size: 0.875rem;
      color: var(--reader-muted);
      text-align: center;
      margin-top: 1rem;
      font-style: italic;
    }
    
    /* 风险等级条形图 */
    .risk-chart {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .risk-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 0;
    }
    
    .risk-bar::before {
      content: '';
      width: var(--value);
      height: 24px;
      background: var(--color);
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    
    .risk-label {
      min-width: 80px;
      font-weight: 500;
      color: var(--reader-text);
    }
    
    .risk-value {
      font-weight: 700;
      color: var(--color);
      min-width: 50px;
    }
    
    /* 饼图样式 */
    .pie-chart {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      border-radius: 50%;
      background: conic-gradient(
        var(--color1) var(--slice1),
        var(--color2) var(--slice1) var(--slice2),
        var(--color3) var(--slice2) var(--slice3),
        var(--color4) var(--slice3)
      );
      position: relative;
    }
    
    .pie-chart::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      background: var(--reader-bg);
      border-radius: 50%;
    }
    
    .pie-legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }
    
    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }
    
    .pie-legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
    
    /* 流程图样式 */
    .flow-chart {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }
    
    .flow-step {
      background: linear-gradient(135deg, var(--reader-accent), #7C3AED);
      color: white;
      padding: 1rem 2rem;
      border-radius: 8px;
      text-align: center;
      min-width: 200px;
      font-weight: 500;
    }
    
    .flow-arrow {
      color: var(--reader-muted);
      font-size: 1.5rem;
    }
    
    /* 数据表格样式 */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9375rem;
    }
    
    .data-table th,
    .data-table td {
      border: 1px solid var(--reader-border);
      padding: 0.75rem;
      text-align: left;
    }
    
    .data-table th {
      background: var(--reader-accent);
      color: white;
      font-weight: 600;
    }
    
    .data-table tr:nth-child(even) {
      background: rgba(79, 70, 229, 0.05);
    }
    
    /* 打印样式 - PDF优化 */
    @page {
      size: A4;
      margin: 2cm 2cm;
    }
    
    @page :first {
      margin-top: 1.5cm;
    }
    
    @media print {
      /* 隐藏非内容元素 */
      .reader-header,
      .reader-sidebar,
      .reader-progress-indicator,
      .reader-pagination,
      .reader-progress-bar,
      .reader-loading,
      .chunk-loading,
      .sidebar-toggle,
      .lang-btn,
      .reader-btn {
        display: none !important;
      }
      
      /* 确保内容区域全宽 */
      .reader-main {
        margin: 0 !important;
        padding: 0 !important;
        min-height: auto !important;
        display: block !important;
      }
      
      .reader-content-wrapper {
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      
      .reader-content {
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      
      /* 文章排版优化 */
      .reader-article {
        font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif !important;
        font-size: 11pt !important;
        line-height: 1.8 !important;
        color: #1a1a1a !important;
        text-align: justify;
      }
      
      .reader-article h1 {
        font-size: 20pt !important;
        font-weight: 700 !important;
        margin: 0 0 1.5rem 0 !important;
        padding-bottom: 0.5rem !important;
        border-bottom: 2px solid #4F46E5 !important;
        color: #1a1a1a !important;
        page-break-after: avoid;
        break-after: avoid;
      }
      
      .reader-article h2 {
        font-size: 14pt !important;
        font-weight: 600 !important;
        margin: 1.8rem 0 0.8rem 0 !important;
        padding: 0.4rem 0 !important;
        border-left: 3px solid #4F46E5 !important;
        padding-left: 0.8rem !important;
        color: #2d3748 !important;
        page-break-after: avoid;
        break-after: avoid;
      }
      
      .reader-article h3 {
        font-size: 12pt !important;
        font-weight: 600 !important;
        margin: 1.2rem 0 0.6rem 0 !important;
        color: #4a5568 !important;
        page-break-after: avoid;
        break-after: avoid;
      }
      
      .reader-article h4 {
        font-size: 11pt !important;
        font-weight: 600 !important;
        margin: 1rem 0 0.5rem 0 !important;
        color: #4a5568 !important;
      }
      
      .reader-article p {
        margin: 0.6rem 0 !important;
        orphans: 3;
        widows: 3;
      }
      
      .reader-article ul, .reader-article ol {
        margin: 0.6rem 0 !important;
        padding-left: 1.5rem !important;
      }
      
      .reader-article li {
        margin: 0.25rem 0 !important;
        orphans: 2;
        widows: 2;
      }
      
      /* 图表容器 - 优化PDF输出 */
      .chart-container {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
        margin: 1.2rem 0 !important;
        padding: 1rem !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 6px !important;
        background: #ffffff !important;
        box-shadow: none !important;
      }
      
      .chart-title {
        font-size: 11pt !important;
        font-weight: 600 !important;
        color: #2d3748 !important;
        margin-bottom: 0.8rem !important;
        text-align: center !important;
      }
      
      .chart-caption {
        font-size: 9pt !important;
        color: #718096 !important;
        text-align: center !important;
        margin-top: 0.8rem !important;
        font-style: italic !important;
      }
      
      /* 风险条形图 - 打印优化 */
      .risk-chart {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      
      .risk-bar {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        padding: 0.3rem 0;
      }
      
      .risk-bar::before {
        content: '';
        width: var(--value);
        height: 20px;
        background: var(--color);
        border-radius: 3px;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      
      .risk-label {
        min-width: 70px;
        font-weight: 500;
        font-size: 10pt;
        color: #1a1a1a !important;
      }
      
      .risk-value {
        font-weight: 600;
        font-size: 10pt;
        color: var(--color) !important;
        min-width: 40px;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      
      /* 饼图 - 打印优化 */
      .pie-chart {
        width: 160px;
        height: 160px;
        margin: 0 auto;
        border-radius: 50%;
        background: conic-gradient(
          var(--color1) var(--slice1),
          var(--color2) var(--slice1) var(--slice2),
          var(--color3) var(--slice2) var(--slice3),
          var(--color4) var(--slice3)
        );
        position: relative;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      
      .pie-chart::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;
        background: #ffffff;
        border-radius: 50%;
      }
      
      .pie-legend {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.8rem;
        margin-top: 0.8rem;
      }
      
      .pie-legend-item {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 9pt;
      }
      
      .pie-legend-color {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      
      /* 流程图 */
      .flow-chart {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        align-items: center;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }
      
      .flow-step {
        background: linear-gradient(135deg, #4F46E5, #7C3AED) !important;
        color: white !important;
        padding: 0.6rem 1.5rem;
        border-radius: 6px;
        text-align: center;
        min-width: 180px;
        font-weight: 500;
        font-size: 10pt;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      
      .flow-arrow {
        color: #666 !important;
        font-size: 1.2rem;
      }
      
      /* 数据表格 */
      .data-table,
      .reader-article table {
        width: 100%;
        border-collapse: collapse;
        margin: 0.8rem 0 !important;
        font-size: 9pt !important;
        break-inside: auto;
        page-break-inside: auto;
      }
      
      .data-table th,
      .reader-article table th {
        background: #4F46E5 !important;
        color: white !important;
        font-weight: 600 !important;
        padding: 0.5rem !important;
        border: 1px solid #4F46E5 !important;
        text-align: left;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      
      .data-table td,
      .reader-article table td {
        padding: 0.4rem 0.5rem !important;
        border: 1px solid #e2e8f0 !important;
        color: #1a1a1a !important;
      }
      
      .data-table tr:nth-child(even),
      .reader-article table tr:nth-child(even) {
        background: #f7fafc !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      
      /* 代码块 */
      pre, code {
        background: #f5f5f5 !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 4px !important;
        font-family: 'Consolas', 'Monaco', monospace !important;
        font-size: 8pt !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;

      pre {

        overflow-x: auto !important;

      /* 分隔线 */

      /* 引用块 */

        border-left: 3px solid #4F46E5 !important;

      /* 图片 */

        max-width: 100% !important;

      /* 分页控制 */

        break-after: avoid !important;
      }
      
      h3, h4 {

        break-after: avoid !important;
      }
      
      /* 确保列表项不跨页 */

      /* 打印页眉信息 */

      /* 隐藏打印按钮 */

<body class="font-medium">

  <!-- 顶部工具栏 -->
  <header class="reader-header">
    <div class="reader-header-left">
      <span class="reader-logo" onclick="goBack()">Obt★Star</span>
      <span class="reader-title" id="reportTitle">加载中...</span>
    </div>
    <div class="reader-header-right">
      <button class="reader-btn sidebar-toggle" onclick="toggleSidebar()" title="目录">
        <i class="fas fa-bars"></i>
      </button>
      <button class="reader-btn lang-btn" onclick="toggleLanguage()" title="切换语言" style="font-size: 0.75rem; font-weight: 600; width: auto; padding: 0 10px;">
        <span id="langIcon">中</span>
      </button>
      <button class="reader-btn" onclick="toggleTheme()" title="深色模式">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>
      <button class="reader-btn" onclick="decreaseFont()" title="字体减小">
        <i class="fas fa-font" style="font-size:0.8rem"></i>
      </button>
      <button class="reader-btn" onclick="increaseFont()" title="字体增大">
        <i class="fas fa-font" style="font-size:1rem"></i>
      </button>
      <!-- 打印按钮已暂时隐藏
      <button class="reader-btn" onclick="printReport()" title="导出PDF" style="color: #4F46E5;">
        <i class="fas fa-file-pdf"></i>
      </button>
      -->
      <button class="reader-btn" onclick="toggleFullscreen()" title="全屏">
        <i class="fas fa-expand" id="fullscreenIcon"></i>
      </button>
    </div>
  </header>

  <!-- 阅读进度条 -->
  <div class="reader-progress-bar">
    <div class="reader-progress-fill" id="progressFill"></div>
  </div>

  <!-- 主内容区 -->
  <div class="reader-main">
    
    <!-- 左侧边栏 -->
    <aside class="reader-sidebar" id="sidebar">
      <div class="reader-sidebar-header">
        <i class="fas fa-list-ul" style="margin-right:0.5rem"></i>目录
      </div>
      <nav class="reader-toc" id="tocList">
        <!-- 由 JS 填充 -->
      </nav>
    </aside>

    <!-- 中间内容 -->
    <div class="reader-content-wrapper">
      <article class="reader-content">
        <div class="reader-loading" id="loading">
          <i class="fas fa-spinner"></i>
          <p>正在加载报告内容...</p>
        </div>
        <div class="reader-article" id="articleBody" style="display:none">
          <!-- 由 JS 填充 -->
        </div>
        
        <!-- 分块加载指示器 -->
        <div class="chunk-loading" id="chunkLoading" style="display:none">
          <i class="fas fa-spinner"></i>
          <span>正在加载更多内容...</span>
        </div>
        
        <!-- 分页导航 -->
        <div class="reader-pagination" id="pagination" style="display:none">
          <button class="reader-page-btn" id="prevBtn" onclick="changePage(-1)">
            <i class="fas fa-chevron-left"></i> 上一页
          </button>
          <span class="reader-page-info" id="pageInfo">1 / 1</span>
          <button class="reader-page-btn" id="nextBtn" onclick="changePage(1)">
            下一页 <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </article>
    </div>

    <!-- 右侧进度指示器 -->
    <div class="reader-progress-indicator" id="progressIndicator">
      <!-- 由 JS 填充 -->
    </div>
  </div>

  <!-- 数据文件 -->
  <script src="data/reports.js"></script>
  <!-- 主题管理器 -->
  <script src="js/theme-manager.js"></script>
  <!-- 书签系统 -->
  <script src="js/bookmarks.js"></script>
  
  <script>
    // 多语言支持
    const i18n = {
      'zh-CN': {
        loading: '正在加载报告内容...',
        loadingMore: '正在加载更多内容...',
        noContent: '暂无完整内容',
        returnDetail: '返回报告详情',
        toc: '目录',
        prevPage: '上一页',
        nextPage: '下一页',
        page: '页',
        theme: '深色模式',
        fontDecrease: '字体减小',
        fontIncrease: '字体增大',
        fullscreen: '全屏',
        exitFullscreen: '退出全屏',
        language: '切换语言',
        share: '分享',
        bookmark: '收藏',
        close: '关闭',
        pageOf: '/',
        printPdf: '导出PDF',
        preparingPrint: '正在准备PDF...'
      },
      'en': {
        loading: 'Loading report content...',
        loadingMore: 'Loading more content...',
        noContent: 'No content available',
        returnDetail: 'Return to Report Detail',
        toc: 'Table of Contents',
        prevPage: 'Previous',
        nextPage: 'Next',
        page: 'Page',
        theme: 'Toggle Theme',
        fontDecrease: 'Decrease Font',
        fontIncrease: 'Increase Font',
        fullscreen: 'Fullscreen',
        exitFullscreen: 'Exit Fullscreen',
        language: 'Switch Language',
        share: 'Share',
        bookmark: 'Bookmark',
        close: 'Close',
        pageOf: '/',
        printPdf: 'Export PDF',
        preparingPrint: 'Preparing PDF...'
      },
      'ja': {
        loading: 'レポートコンテンツを読み込み中...',
        loadingMore: ' المزيد من المحتوىを読み込み中...',
        noContent: 'コンテンツがありません',
        returnDetail: 'レポート詳細に戻る',
        toc: '目次',
        prevPage: '前のページ',
        nextPage: '次のページ',
        page: 'ページ',
        theme: 'ダークモード',
        fontDecrease: 'フォントを小さく',
        fontIncrease: 'フォントを大きく',
        fullscreen: '全画面',
        exitFullscreen: '全画面を終了',
        language: '言語を切り替え',
        share: '共有',
        bookmark: 'ブックマーク',
        close: '閉じる',
        pageOf: '/',
        printPdf: 'PDF出力',
        preparingPrint: 'PDF準備中...'
      }
    };

    // 支持的语言列表（用于循环切换）
    const SUPPORTED_LANGS = ['zh-CN', 'en', 'ja'];
    const LANG_LABELS = { 'zh-CN': '中', 'en': 'EN', 'ja': '日' };

    // 当前语言
    let currentLang = localStorage.getItem('reader-lang') || 'zh-CN';

    // 获取翻译文本
    function t(key) {
      return i18n[currentLang]?.[key] || i18n['zh-CN'][key] || key;
    }

    // 切换语言（循环切换：中文 -> 英文 -> 日文 -> 中文）
    function toggleLanguage() {
      const currentIndex = SUPPORTED_LANGS.indexOf(currentLang);
      const nextIndex = (currentIndex + 1) % SUPPORTED_LANGS.length;
      currentLang = SUPPORTED_LANGS[nextIndex];
      localStorage.setItem('reader-lang', currentLang);
      updateLanguageUI();
      updatePageText();
      // 重新渲染内容以应用新语言
      if (allSections.length > 0) {
        renderPage(currentPage);
        renderTOC();
      }
    }

    // 更新语言UI
    function updateLanguageUI() {
      const langBtn = document.getElementById('langBtn');
      const langIcon = document.getElementById('langIcon');
      if (langIcon) {
        langIcon.textContent = LANG_LABELS[currentLang] || '中';
      }
    }

    // 更新页面文本
    function updatePageText() {
      // 目录标题
      const tocHeader = document.querySelector('.reader-sidebar-header');
      if (tocHeader) {
        tocHeader.innerHTML = `<i class="fas fa-list-ul" style="margin-right:0.5rem"></i>${t('toc')}`;
      }
      
      // 加载状态
      const loadingEl = document.getElementById('loading');
      if (loadingEl) {
        loadingEl.querySelector('p').textContent = t('loading');
      }
      
      // 分块加载
      const chunkLoading = document.getElementById('chunkLoading');
      if (chunkLoading) {
        chunkLoading.querySelector('span').textContent = t('loadingMore');
      }
      
      // 分页按钮
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      if (prevBtn) {
        prevBtn.innerHTML = `<i class="fas fa-chevron-left"></i> ${t('prevPage')}`;
      }
      if (nextBtn) {
        nextBtn.innerHTML = `${t('nextPage')} <i class="fas fa-chevron-right"></i>`;
      }
      
      // 更新分页信息
      const pageInfo = document.getElementById('pageInfo');
      if (pageInfo && pageInfo.textContent) {
        const parts = pageInfo.textContent.split(/[\/\-]/);
        if (parts.length >= 2) {
          pageInfo.textContent = `${parts[0]} ${t('pageOf')} ${parts[parts.length - 1]}`;
        }
      }
      
      // 更新工具栏按钮 title
      document.querySelectorAll('.reader-btn').forEach(btn => {
        const title = btn.getAttribute('title');
        const icon = btn.querySelector('i');
        if (icon) {
          if (icon.classList.contains('fa-moon') || icon.classList.contains('fa-sun')) {
            btn.setAttribute('title', t('theme'));
          } else if (icon.classList.contains('fa-expand') || icon.classList.contains('fa-compress')) {
            btn.setAttribute('title', isFullscreen ? t('exitFullscreen') : t('fullscreen'));
          }
        }
      });
      
      // 更新无内容提示
      const noContentBtn = document.querySelector('.reader-page-btn[onclick="goBack()"]');
      if (noContentBtn) {
        noContentBtn.textContent = t('returnDetail');
      }
    }

    // 获取URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const reportId = urlParams.get('id') || 'report-001';
    const report = REPORTS.find(r => r.id === reportId) || REPORTS[0];
    
    // 报告数据管理
    let reportManifest = null;  // 报告清单
    let loadedChunks = {};      // 已加载的分块
    let allSections = [];       // 所有章节（合并后）
    
    // 状态变量
    let currentPage = 1;
    let currentSection = 0;
    const sectionsPerPage = 3;
    let isDark = false;
    let fontLevel = 1;
    let totalChunks = 0;
    let isFullscreen = false;

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      init();
    });

    async function init() {
      // 初始化语言
      updateLanguageUI();
      
      // 设置标题
      document.title = `${report.title} - 阅读模式`;
      document.getElementById('reportTitle').textContent = report.title;

      // 检查是否需要自动打印
      const shouldPrint = urlParams.get('print') === '1';

      // 加载报告清单
      reportManifest = await loadManifest(reportId);
      
      if (!reportManifest) {
        showNoContent();
        return;
      }

      totalChunks = reportManifest.totalChunks;
      
      // 先加载第一块内容（包含摘要和前几章）
      const firstChunk = await loadChunk(reportId, 0);
      if (firstChunk) {
        loadedChunks[0] = firstChunk;
        allSections = [...firstChunk.sections];
        
        renderTOC();
        renderProgressIndicator();
        renderPage(1);
        
        // 如果需要打印，预加载所有内容后触发打印
        if (shouldPrint) {
          await preloadAllChunks();
          setTimeout(() => {
            window.print();
          }, 1500);
        }
      } else {
        showNoContent();
      }

      // 滚动监听
      window.addEventListener('scroll', updateProgress);
    }

    // 预加载所有分块（用于打印）
    async function preloadAllChunks() {
      for (let i = 1; i < totalChunks; i++) {
        const chunk = await loadChunk(reportId, i);
        if (chunk) {
          mergeSections(chunk);
        }
      }
      // 注意：不调用 renderPage，避免覆盖已渲染的内容
      // 调用方会负责重新渲染（如 printReport 中的 renderFullContent）
    }

    // 加载报告清单
    async function loadManifest(reportId) {
      try {
        const response = await fetch(`data/reports-content/${reportId}/manifest.json`);
        if (!response.ok) return null;
        return await response.json();
      } catch (error) {
        console.error('加载清单失败:', error);
        return null;
      }
    }

    // 加载指定分块
    async function loadChunk(reportId, chunkIndex) {
      // 检查是否已加载
      if (loadedChunks[chunkIndex]) {
        return loadedChunks[chunkIndex];
      }
      
      try {
        const response = await fetch(`data/reports-content/${reportId}/chunk-${chunkIndex}.js`);
        if (!response.ok) {
          console.error(`加载 chunk ${chunkIndex} 失败: HTTP ${response.status}`);
          return null;
        }
        
        const jsCode = await response.text();
        
        // 执行JS代码 - 使用 Function 构造器更安全
        const chunkKey = `REPORT_CHUNK_${reportId.replace(/-/g, '_')}_${chunkIndex}`;
        try {
          // 清除旧的 chunk 数据
          if (window[chunkKey]) {
            delete window[chunkKey];
          }
          // 执行新代码
          eval(jsCode);
        } catch (e) {
          console.error('执行 chunk JS 失败:', e);
          return null;
        }
        
        // 获取内容
        const chunk = window[chunkKey];
        
        if (chunk) {
          loadedChunks[chunkIndex] = chunk;
          return chunk;
        } else {
          console.error(`Chunk ${chunkIndex} 执行后未找到数据: ${chunkKey}`);
        }
        return null;
      } catch (error) {
        console.error(`加载分块 ${chunkIndex} 失败:`, error);
        return null;
      }
    }

    // 确保指定范围的章节已加载
    async function ensureSectionsLoaded(sectionIndex) {
      if (!reportManifest) return;
      
      // 计算需要加载的分块
      const sectionsPerChunk = Math.ceil(allSections.length / totalChunks);
      const targetChunk = Math.floor(sectionIndex / sectionsPerChunk);
      
      // 加载目标分块及其相邻分块（预加载）
      const chunksToLoad = [targetChunk];
      if (targetChunk > 0) chunksToLoad.push(targetChunk - 1);
      if (targetChunk < totalChunks - 1) chunksToLoad.push(targetChunk + 1);
      
      for (const chunkIdx of chunksToLoad) {
        if (!loadedChunks[chunkIdx]) {
          showChunkLoading();
          const chunk = await loadChunk(reportId, chunkIdx);
          if (chunk) {
            // 合并章节
            mergeSections(chunk);
          }
          hideChunkLoading();
        }
      }
    }

    // 合并章节（保持顺序）
    function mergeSections(chunk) {
      // 根据chunkIndex确定插入位置
      const existingIds = new Set(allSections.map(s => s.title));
      
      for (const section of chunk.sections) {
        if (!existingIds.has(section.title)) {
          allSections.push(section);
          existingIds.add(section.title);
        }
      }
      
      // 重新渲染目录
      renderTOC();
    }

    // 获取章节标题（根据语言）
    function getSectionTitle(section) {
      // 优先使用中文，如果没有则使用英文，最后使用默认
      if (section.title_i18n) {
        if (section.title_i18n['zh-CN']) {
          return section.title_i18n['zh-CN'];
        }
        if (section.title_i18n['en']) {
          return section.title_i18n['en'];
        }
        // 返回第一个可用的语言
        const firstLang = Object.keys(section.title_i18n)[0];
        if (firstLang) {
          return section.title_i18n[firstLang];
        }
      }
      return section.title;
    }

    // 获取章节内容（根据语言）
    function getSectionContent(section) {
      // 优先使用中文，如果没有则使用英文，最后使用默认
      if (section.content_i18n) {
        if (section.content_i18n['zh-CN']) {
          return section.content_i18n['zh-CN'];
        }
        if (section.content_i18n['en']) {
          return section.content_i18n['en'];
        }
        // 返回第一个可用的语言
        const firstLang = Object.keys(section.content_i18n)[0];
        if (firstLang) {
          return section.content_i18n[firstLang];
        }
      }
      return section.content;
    }

    // 显示分块加载状态
    function showChunkLoading() {
      document.getElementById('chunkLoading').style.display = 'block';
    }

    function hideChunkLoading() {
      document.getElementById('chunkLoading').style.display = 'none';
    }

    // 显示无内容
    function showNoContent() {
      document.getElementById('loading').innerHTML = `
        <i class="fas fa-exclamation-circle"></i>
        <p>暂无完整内容</p>
        <button class="reader-page-btn" style="margin-top:1rem" onclick="goBack()">
          返回报告详情
        </button>
      `;
    }

    // 渲染目录
    function renderTOC() {
      const toc = document.getElementById('tocList');
      let html = '';
      
      allSections.forEach((section, idx) => {
        const levelClass = section.level === 1 ? '' : (section.level === 2 ? 'lv2' : 'lv3');
        const title = getSectionTitle(section);
        html += `<div class="reader-toc-item ${levelClass}" onclick="scrollToSection(${idx})" data-idx="${idx}">${title}</div>`;
      });
      
      toc.innerHTML = html;
    }

    // 渲染右侧进度点
    function renderProgressIndicator() {
      const indicator = document.getElementById('progressIndicator');
      const totalPages = Math.ceil(allSections.length / sectionsPerPage);
      
      let html = '';
      for (let i = 0; i < totalPages; i++) {
        const activeClass = i === 0 ? 'active' : '';
        html += `<div class="progress-dot ${activeClass}" onclick="goToPage(${i + 1})" title="第${i + 1}页"></div>`;
      }
      
      indicator.innerHTML = html;
    }

    // 渲染当前页
    async function renderPage(page) {
      currentPage = page;
      
      const startIdx = (page - 1) * sectionsPerPage;
      const endIdx = Math.min(startIdx + sectionsPerPage, allSections.length);
      
      // 确保需要的章节已加载
      await ensureSectionsLoaded(endIdx - 1);
      
      const pageSections = allSections.slice(startIdx, endIdx);
      
      // 更新文章内容
      const article = document.getElementById('articleBody');
      // 获取报告标题（支持多语言）
      const reportTitle = report.title_i18n?.[currentLang] || report.title;
      let html = `<h1>${reportTitle}</h1>`;
      
      pageSections.forEach((section, sIdx) => {
        const tag = section.level === 1 ? 'h2' : 'h3';
        const sectionTitle = getSectionTitle(section);
        const sectionContent = getSectionContent(section);
        html += `
          <${tag} id="section-${startIdx + sIdx}">${sectionTitle}</${tag}>
          ${sectionContent}
        `;
      });
      
      article.innerHTML = html;
      article.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('pagination').style.display = 'flex';
      
      // 更新分页信息
      const totalPages = Math.ceil(allSections.length / sectionsPerPage);
      document.getElementById('pageInfo').textContent = `${page} ${t('pageOf')} ${totalPages}`;
      document.getElementById('prevBtn').disabled = page === 1;
      document.getElementById('nextBtn').disabled = page === totalPages;
      
      // 更新按钮文本（支持多语言）
      updatePageText();
      
      // 更新进度指示器
      updateProgressDots(page);
      
      // 更新目录选中状态
      updateTOCHighlight();
      
      // 滚动到顶部
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 切换页面
    async function changePage(direction) {
      const totalPages = Math.ceil(allSections.length / sectionsPerPage);
      const newPage = currentPage + direction;
      
      if (newPage >= 1 && newPage <= totalPages) {
        await renderPage(newPage);
      }
    }

    // 跳转到指定页
    async function goToPage(page) {
      await renderPage(page);
    }

    // 滚动到指定章节
    async function scrollToSection(idx) {
      // 确保章节已加载
      await ensureSectionsLoaded(idx);
      
      const el = document.getElementById(`section-${idx}`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // 更新当前页
        const page = Math.floor(idx / sectionsPerPage) + 1;
        if (page !== currentPage) {
          currentPage = page;
          updateProgressDots(page);
          updateTOCHighlight();
        }
      }
    }

    // 更新进度条
    function updateProgress() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = (scrollTop / docHeight) * 100;
      
      document.getElementById('progressFill').style.width = `${progress}%`;
    }

    // 更新进度点
    function updateProgressDots(page) {
      const dots = document.querySelectorAll('.progress-dot');
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === page - 1);
      });
    }

    // 更新目录高亮
    function updateTOCHighlight() {
      const items = document.querySelectorAll('.reader-toc-item');
      const startIdx = (currentPage - 1) * sectionsPerPage;
      const endIdx = Math.min(startIdx + sectionsPerPage, allSections.length);
      
      items.forEach((item, idx) => {
        item.classList.toggle('active', idx >= startIdx && idx < endIdx);
      });
    }

    // 切换边栏（移动端）
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('open');
    }

    // 切换主题
    function toggleTheme() {
      // 使用全局主题管理器
      if (window.themeManager) {
        window.themeManager.toggle();
        const isDark = window.themeManager.isDark();
        document.body.classList.toggle('theme-dark', isDark);
        document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      } else {
        // 降级：使用本地状态
        isDark = !isDark;
        document.body.classList.toggle('theme-dark', isDark);
      }
      document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }

    // 字体大小控制
    function decreaseFont() {
      if (fontLevel > 0) {
        fontLevel--;
        updateFontSize();
      }
    }

    function increaseFont() {
      if (fontLevel < 2) {
        fontLevel++;
        updateFontSize();
      }
    }

    function updateFontSize() {
      document.body.classList.remove('font-small', 'font-medium', 'font-large');
      if (fontLevel === 0) document.body.classList.add('font-small');
      else if (fontLevel === 2) document.body.classList.add('font-large');
      else document.body.classList.add('font-medium');
    }

    // 全屏
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fullscreenIcon').className = 'fas fa-compress';
        isFullscreen = true;
      } else {
        document.exitFullscreen();
        document.getElementById('fullscreenIcon').className = 'fas fa-expand';
        isFullscreen = false;
      }
    }

    // 打印/导出PDF
    async function printReport() {
      // 显示加载提示
      const loadingEl = document.getElementById('loading');
      const articleBody = document.getElementById('articleBody');
      const pagination = document.getElementById('pagination');
      
      // 保存当前状态
      const originalArticleContent = articleBody.innerHTML;
      const originalPaginationDisplay = pagination.style.display;
      const originalPage = currentPage;
      
      loadingEl.innerHTML = `
        <i class="fas fa-spinner" style="animation: spin 1s linear infinite;"></i>
        <p>${t('preparingPrint')}</p>
      `;
      loadingEl.style.display = 'flex';
      articleBody.style.display = 'none';
      
      try {
        // 预加载所有分块（确保内容完整）
        await preloadAllChunks();
        
        // 渲染全部内容到单页
        await renderFullContent();
        
        // 确保所有图表样式正确应用
        fixChartStylesForPrint();
        
        // 延迟确保渲染完成
        await new Promise(resolve => setTimeout(resolve, 800));
        
        // 触发打印
        window.print();
        
        // 打印完成后恢复原始状态
        await new Promise(resolve => setTimeout(resolve, 500));
        
      } catch (error) {
        console.error('打印准备失败:', error);
        alert('打印准备失败，请重试');
      } finally {
        // 恢复原始内容
        articleBody.innerHTML = originalArticleContent;
        articleBody.style.display = 'block';
        pagination.style.display = originalPaginationDisplay;
        loadingEl.style.display = 'none';
        
        // 恢复当前页
        currentPage = originalPage;
      }
    }

    // 渲染完整内容（用于打印）
    async function renderFullContent() {
      // 合并所有分块
      for (let i = 1; i < totalChunks; i++) {
        if (!loadedChunks[i]) {
          const chunk = await loadChunk(reportId, i);
          if (chunk) {
            mergeSections(chunk);
          }
        }
      }
      
      // 获取报告标题（支持多语言）
      const reportTitle = report.title_i18n?.[currentLang] || report.title;
      const reportSubtitle = report.subtitle_i18n?.[currentLang] || report.subtitle;
      const reportDate = report.date;
      const reportSource = report.source;
      
      // 渲染完整内容
      const article = document.getElementById('articleBody');
      
      // 构建打印头部信息
      let html = `
        <div class="print-header" style="margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid #4F46E5;">
          <h1 style="font-size: 22pt; font-weight: 700; margin: 0 0 0.5rem 0; color: #1a1a1a;">${reportTitle}</h1>
          ${reportSubtitle ? `<p style="font-size: 14pt; color: #4a5568; margin: 0 0 0.5rem 0;">${reportSubtitle}</p>` : ''}
          <div style="font-size: 10pt; color: #718096; margin-top: 1rem;">
            ${reportSource ? `<span>来源: ${reportSource}</span>` : ''}
            ${reportDate ? `<span style="margin-left: 1rem;">发布日期: ${reportDate}</span>` : ''}
          </div>
        </div>
      `;
      
      // 渲染所有章节
      allSections.forEach((section, idx) => {
        const tag = section.level === 1 ? 'h2' : 'h3';
        const sectionTitle = getSectionTitle(section);
        const sectionContent = getSectionContent(section);
        
        // 处理内容中的图表，确保打印时样式正确
        const processedContent = processContentForPrint(sectionContent);
        
        html += `
          <${tag} id="print-section-${idx}" style="page-break-after: avoid;">${sectionTitle}</${tag}>
          ${processedContent}
        `;
      });
      
      // 添加打印页脚
      html += `
        <div class="print-footer" style="margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e2e8f0; font-size: 9pt; color: #718096; text-align: center;">
          <p>本文档由 ObtStar 报告平台生成 | www.obtstar.com</p>
          <p>生成时间: ${new Date().toLocaleString('zh-CN')}</p>
        </div>
      `;
      
      article.innerHTML = html;
      article.style.display = 'block';
      
      // 隐藏分页控件
      document.getElementById('pagination').style.display = 'none';
    }

    // 处理内容，优化打印显示
    function processContentForPrint(content) {
      if (!content) return '';
      
      // 创建一个临时容器来处理内容
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = content;
      
      // 为所有图表容器添加打印优化属性
      tempDiv.querySelectorAll('.chart-container').forEach(chart => {
        chart.style.pageBreakInside = 'avoid';
        chart.style.breakInside = 'avoid';
      });
      
      // 为表格添加打印优化
      tempDiv.querySelectorAll('table').forEach(table => {
        table.style.pageBreakInside = 'auto';
        table.style.breakInside = 'auto';
        table.style.width = '100%';
        table.style.borderCollapse = 'collapse';
      });
      
      // 为表格行添加打印优化
      tempDiv.querySelectorAll('tr').forEach(row => {
        row.style.pageBreakInside = 'avoid';
        row.style.breakInside = 'avoid';
      });
      
      return tempDiv.innerHTML;
    }

    // 修复图表样式以确保打印时正确显示
    function fixChartStylesForPrint() {
      // 修复风险条形图
      document.querySelectorAll('.risk-bar').forEach(bar => {
        const value = bar.style.getPropertyValue('--value');
        const color = bar.style.getPropertyValue('--color');
        if (value && color) {
          bar.style.setProperty('--value', value, 'important');
          bar.style.setProperty('--color', color, 'important');
        }
      });
      
      // 修复饼图
      document.querySelectorAll('.pie-chart').forEach(pie => {
        const styles = ['--color1', '--color2', '--color3', '--color4', '--slice1', '--slice2', '--slice3'];
        styles.forEach(style => {
          const value = pie.style.getPropertyValue(style);
          if (value) {
            pie.style.setProperty(style, value, 'important');
          }
        });
      });
      
      // 确保所有图表颜色在打印时保留
      document.querySelectorAll('.chart-container, .flow-step, .risk-bar::before, .pie-chart, .pie-legend-color, .data-table th, .data-table tr:nth-child(even)').forEach(el => {
        el.style.webkitPrintColorAdjust = 'exact';
        el.style.printColorAdjust = 'exact';
      });
    }

    // 返回
    function goBack() {
      window.location.href = `report-detail.html?id=${reportId}`;
    }
  </script>
</body>
</html>
