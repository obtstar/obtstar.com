<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>阅读报告 · ObtStar</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <style>
    /* 全屏阅读模式专用样式 */
    :root {
      --reader-bg: #FAFBFC;
      --reader-text: #1F2937;
      --reader-muted: #6B7280;
      --reader-border: #E5E7EB;
      --reader-accent: #4F46E5;
      --reader-sidebar-w: 280px;
      --reader-content-max: 720px;
    }

    /* 深色主题 */
    .theme-dark {
      --reader-bg: #111827;
      --reader-text: #F3F4F6;
      --reader-muted: #9CA3AF;
      --reader-border: #374151;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    
    body {
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--reader-bg);
      color: var(--reader-text);
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* 顶部工具栏 */
    .reader-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--reader-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 100;
      transition: all 0.3s ease;
    }
    .theme-dark .reader-header {
      background: rgba(17,24,39,0.92);
    }

    .reader-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .reader-logo {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
    }

    .reader-title {
      font-size: 0.9375rem;
      color: var(--reader-muted);
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reader-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .reader-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--reader-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .reader-btn:hover {
      background: rgba(79,70,229,0.1);
      color: var(--reader-accent);
    }

    /* 阅读进度条 */
    .reader-progress-bar {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--reader-border);
      z-index: 99;
    }
    .reader-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4F46E5, #7C3AED);
      width: 0%;
      transition: width 0.1s ease;
    }

    /* 主内容区 */
    .reader-main {
      display: flex;
      min-height: 100vh;
      padding-top: 56px;
    }

    /* 左侧边栏 */
    .reader-sidebar {
      position: fixed;
      left: 0;
      top: 56px;
      bottom: 0;
      width: var(--reader-sidebar-w);
      background: var(--reader-bg);
      border-right: 1px solid var(--reader-border);
      overflow-y: auto;
      z-index: 50;
      transition: transform 0.3s ease;
    }

    .reader-sidebar-header {
      padding: 1.25rem 1.5rem;
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--reader-text);
      border-bottom: 1px solid var(--reader-border);
      position: sticky;
      top: 0;
      background: var(--reader-bg);
      z-index: 2;
    }

    .reader-toc {
      padding: 0.75rem 0;
    }

    .reader-toc-item {
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      color: var(--reader-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      border-left: 3px solid transparent;
    }
    .reader-toc-item:hover {
      background: rgba(79,70,229,0.05);
      color: var(--reader-text);
    }
    .reader-toc-item.active {
      background: rgba(79,70,229,0.1);
      color: var(--reader-accent);
      border-left-color: var(--reader-accent);
      font-weight: 500;
    }
    .reader-toc-item.lv2 {
      padding-left: 2.25rem;
      font-size: 0.8125rem;
    }
    .reader-toc-item.lv3 {
      padding-left: 3rem;
      font-size: 0.75rem;
    }

    /* 中间内容 */
    .reader-content-wrapper {
      flex: 1;
      margin-left: var(--reader-sidebar-w);
      padding: 2.5rem 2rem;
      display: flex;
      justify-content: center;
    }

    .reader-content {
      width: 100%;
      max-width: var(--reader-content-max);
    }

    .reader-article {
      font-size: 1.0625rem;
      line-height: 1.85;
    }

    .reader-article h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      color: var(--reader-text);
      line-height: 1.3;
    }

    .reader-article h2 {
      font-size: 1.375rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      color: var(--reader-text);
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--reader-accent);
    }

    .reader-article h3 {
      font-size: 1.125rem;
      font-weight: 600;
      margin: 2rem 0 0.75rem;
      color: var(--reader-text);
    }

    .reader-article p {
      margin-bottom: 1.25rem;
      text-align: justify;
    }

    .reader-article ul, .reader-article ol {
      margin: 1rem 0 1.25rem 1.5rem;
    }

    .reader-article li {
      margin-bottom: 0.5rem;
    }

    .reader-article table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9375rem;
    }

    .reader-article th, .reader-article td {
      padding: 0.75rem 1rem;
      border: 1px solid var(--reader-border);
      text-align: left;
    }

    .reader-article th {
      background: rgba(79,70,229,0.08);
      font-weight: 600;
    }

    .reader-article tr:nth-child(even) {
      background: rgba(0,0,0,0.02);
    }
    .theme-dark .reader-article tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    /* 阅读进度指示器（右侧） */
    .reader-progress-indicator {
      position: fixed;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 40;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--reader-border);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .progress-dot:hover {
      transform: scale(1.5);
    }
    .progress-dot.active {
      background: var(--reader-accent);
    }

    /* 分页导航 */
    .reader-pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--reader-border);
    }

    .reader-page-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border: 1px solid var(--reader-border);
      border-radius: 8px;
      background: var(--reader-bg);
      color: var(--reader-text);
      font-size: 0.9375rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .reader-page-btn:hover:not(:disabled) {
      border-color: var(--reader-accent);
      color: var(--reader-accent);
    }
    .reader-page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .reader-page-info {
      font-size: 0.875rem;
      color: var(--reader-muted);
    }

    /* 响应式 */
    @media (max-width: 1023px) {
      :root {
        --reader-sidebar-w: 0px;
      }
      
      .reader-sidebar {
        transform: translateX(-100%);
        width: 260px;
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
      }
      .reader-sidebar.open {
        transform: translateX(0);
      }
      
      .reader-content-wrapper {
        margin-left: 0;
        padding: 2rem 1.5rem;
      }
      
      .reader-title {
        max-width: 120px;
      }
      
      .reader-progress-indicator {
        display: none;
      }
      
      .reader-pagination {
        flex-direction: column;
        gap: 1rem;
      }
      
      .reader-page-btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* 边栏切换按钮（移动端） */
    .sidebar-toggle {
      display: none;
    }
    @media (max-width: 1023px) {
      .sidebar-toggle {
        display: flex;
      }
    }

    /* 字体大小控制 */
    .font-small .reader-article { font-size: 0.9375rem; }
    .font-medium .reader-article { font-size: 1.0625rem; }
    .font-large .reader-article { font-size: 1.25rem; }

    /* 加载动画 */
    .reader-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      color: var(--reader-muted);
    }
    .reader-loading i {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--reader-accent);
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 分块加载指示器 */
    .chunk-loading {
      text-align: center;
      padding: 2rem;
      color: var(--reader-muted);
    }
    .chunk-loading i {
      animation: spin 1s linear infinite;
      margin-right: 0.5rem;
    }

    /* 图表样式 */
    .chart-container {
      background: var(--reader-bg);
      border: 1px solid var(--reader-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      page-break-inside: avoid;
    }
    
    .chart-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--reader-text);
      margin-bottom: 1rem;
      text-align: center;
    }
    
    .chart-caption {
      font-size: 0.875rem;
      color: var(--reader-muted);
      text-align: center;
      margin-top: 1rem;
      font-style: italic;
    }
    
    /* 风险等级条形图 */
    .risk-chart {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .risk-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 0;
    }
    
    .risk-bar::before {
      content: '';
      width: var(--value);
      height: 24px;
      background: var(--color);
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    
    .risk-label {
      min-width: 80px;
      font-weight: 500;
      color: var(--reader-text);
    }
    
    .risk-value {
      font-weight: 700;
      color: var(--color);
      min-width: 50px;
    }
    
    /* 饼图样式 */
    .pie-chart {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      border-radius: 50%;
      background: conic-gradient(
        var(--color1) var(--slice1),
        var(--color2) var(--slice1) var(--slice2),
        var(--color3) var(--slice2) var(--slice3),
        var(--color4) var(--slice3)
      );
      position: relative;
    }
    
    .pie-chart::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      background: var(--reader-bg);
      border-radius: 50%;
    }
    
    .pie-legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }
    
    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }
    
    .pie-legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
    
    /* 流程图样式 */
    .flow-chart {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }
    
    .flow-step {
      background: linear-gradient(135deg, var(--reader-accent), #7C3AED);
      color: white;
      padding: 1rem 2rem;
      border-radius: 8px;
      text-align: center;
      min-width: 200px;
      font-weight: 500;
    }
    
    .flow-arrow {
      color: var(--reader-muted);
      font-size: 1.5rem;
    }
    
    /* 数据表格样式 */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9375rem;
    }
    
    .data-table th,
    .data-table td {
      border: 1px solid var(--reader-border);
      padding: 0.75rem;
      text-align: left;
    }
    
    .data-table th {
      background: var(--reader-accent);
      color: white;
      font-weight: 600;
    }
    
    .data-table tr:nth-child(even) {
      background: rgba(79, 70, 229, 0.05);
    }
    
    /* 打印样式 */
    @media print {
      .reader-header,
      .reader-sidebar,
      .reader-progress-indicator,
      .reader-pagination,
      .reader-progress-bar {
        display: none !important;
      }
      
      .reader-main {
        margin-left: 0 !important;
        margin-right: 0 !important;
      }
      
      .reader-content-wrapper {
        max-width: 100% !important;
        padding: 0 !important;
      }
      
      .reader-article {
        font-size: 11pt !important;
        line-height: 1.6 !important;
      }
      
      .chart-container {
        break-inside: avoid;
        page-break-inside: avoid;
        border: 1px solid #ccc;
      }
      
      body {
        background: white !important;
        color: black !important;
      }
      
      h1, h2, h3 {
        color: black !important;
        break-after: avoid;
        page-break-after: avoid;
      }
    }
  </style>
</head>
<body class="font-medium">

  <!-- 顶部工具栏 -->
  <header class="reader-header">
    <div class="reader-header-left">
      <span class="reader-logo" onclick="goBack()">Obt★Star</span>
      <span class="reader-title" id="reportTitle">加载中...</span>
    </div>
    <div class="reader-header-right">
      <button class="reader-btn sidebar-toggle" onclick="toggleSidebar()" title="目录">
        <i class="fas fa-bars"></i>
      </button>
      <button class="reader-btn" onclick="toggleTheme()" title="深色模式">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>
      <button class="reader-btn" onclick="decreaseFont()" title="字体减小">
        <i class="fas fa-font" style="font-size:0.8rem"></i>
      </button>
      <button class="reader-btn" onclick="increaseFont()" title="字体增大">
        <i class="fas fa-font" style="font-size:1rem"></i>
      </button>
      <button class="reader-btn" onclick="toggleFullscreen()" title="全屏">
        <i class="fas fa-expand" id="fullscreenIcon"></i>
      </button>
    </div>
  </header>

  <!-- 阅读进度条 -->
  <div class="reader-progress-bar">
    <div class="reader-progress-fill" id="progressFill"></div>
  </div>

  <!-- 主内容区 -->
  <div class="reader-main">
    
    <!-- 左侧边栏 -->
    <aside class="reader-sidebar" id="sidebar">
      <div class="reader-sidebar-header">
        <i class="fas fa-list-ul" style="margin-right:0.5rem"></i>目录
      </div>
      <nav class="reader-toc" id="tocList">
        <!-- 由 JS 填充 -->
      </nav>
    </aside>

    <!-- 中间内容 -->
    <div class="reader-content-wrapper">
      <article class="reader-content">
        <div class="reader-loading" id="loading">
          <i class="fas fa-spinner"></i>
          <p>正在加载报告内容...</p>
        </div>
        <div class="reader-article" id="articleBody" style="display:none">
          <!-- 由 JS 填充 -->
        </div>
        
        <!-- 分块加载指示器 -->
        <div class="chunk-loading" id="chunkLoading" style="display:none">
          <i class="fas fa-spinner"></i>
          <span>正在加载更多内容...</span>
        </div>
        
        <!-- 分页导航 -->
        <div class="reader-pagination" id="pagination" style="display:none">
          <button class="reader-page-btn" id="prevBtn" onclick="changePage(-1)">
            <i class="fas fa-chevron-left"></i> 上一页
          </button>
          <span class="reader-page-info" id="pageInfo">1 / 1</span>
          <button class="reader-page-btn" id="nextBtn" onclick="changePage(1)">
            下一页 <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </article>
    </div>

    <!-- 右侧进度指示器 -->
    <div class="reader-progress-indicator" id="progressIndicator">
      <!-- 由 JS 填充 -->
    </div>
  </div>

  <!-- 数据文件 -->
  <script src="data/reports.js"></script>
  
  <script>
    // 获取URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const reportId = urlParams.get('id') || 'report-001';
    const report = REPORTS.find(r => r.id === reportId) || REPORTS[0];
    
    // 报告数据管理
    let reportManifest = null;  // 报告清单
    let loadedChunks = {};      // 已加载的分块
    let allSections = [];       // 所有章节（合并后）
    
    // 状态变量
    let currentPage = 1;
    let currentSection = 0;
    const sectionsPerPage = 3;
    let isDark = false;
    let fontLevel = 1;
    let totalChunks = 0;

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      init();
    });

    async function init() {
      // 设置标题
      document.title = `${report.title} - 阅读模式`;
      document.getElementById('reportTitle').textContent = report.title;

      // 检查是否需要自动打印
      const shouldPrint = urlParams.get('print') === '1';

      // 加载报告清单
      reportManifest = await loadManifest(reportId);
      
      if (!reportManifest) {
        showNoContent();
        return;
      }

      totalChunks = reportManifest.totalChunks;
      
      // 先加载第一块内容（包含摘要和前几章）
      const firstChunk = await loadChunk(reportId, 0);
      if (firstChunk) {
        loadedChunks[0] = firstChunk;
        allSections = [...firstChunk.sections];
        
        renderTOC();
        renderProgressIndicator();
        renderPage(1);
        
        // 如果需要打印，预加载所有内容后触发打印
        if (shouldPrint) {
          await preloadAllChunks();
          setTimeout(() => {
            window.print();
          }, 1500);
        }
      } else {
        showNoContent();
      }

      // 滚动监听
      window.addEventListener('scroll', updateProgress);
    }

    // 预加载所有分块（用于打印）
    async function preloadAllChunks() {
      for (let i = 1; i < totalChunks; i++) {
        const chunk = await loadChunk(reportId, i);
        if (chunk) {
          mergeSections(chunk);
        }
      }
      // 重新渲染以显示所有内容
      renderPage(1);
    }

    // 加载报告清单
    async function loadManifest(reportId) {
      try {
        const response = await fetch(`data/reports-content/${reportId}/manifest.json`);
        if (!response.ok) return null;
        return await response.json();
      } catch (error) {
        console.error('加载清单失败:', error);
        return null;
      }
    }

    // 加载指定分块
    async function loadChunk(reportId, chunkIndex) {
      // 检查是否已加载
      if (loadedChunks[chunkIndex]) {
        return loadedChunks[chunkIndex];
      }
      
      try {
        const response = await fetch(`data/reports-content/${reportId}/chunk-${chunkIndex}.js`);
        if (!response.ok) return null;
        
        const jsCode = await response.text();
        
        // 执行JS代码
        const script = document.createElement('script');
        script.textContent = jsCode;
        document.head.appendChild(script);
        
        // 获取内容
        const chunkKey = `REPORT_CHUNK_${reportId.replace(/-/g, '_')}_${chunkIndex}`;
        const chunk = window[chunkKey];
        
        if (chunk) {
          loadedChunks[chunkIndex] = chunk;
          return chunk;
        }
        return null;
      } catch (error) {
        console.error(`加载分块 ${chunkIndex} 失败:`, error);
        return null;
      }
    }

    // 确保指定范围的章节已加载
    async function ensureSectionsLoaded(sectionIndex) {
      if (!reportManifest) return;
      
      // 计算需要加载的分块
      const sectionsPerChunk = Math.ceil(allSections.length / totalChunks);
      const targetChunk = Math.floor(sectionIndex / sectionsPerChunk);
      
      // 加载目标分块及其相邻分块（预加载）
      const chunksToLoad = [targetChunk];
      if (targetChunk > 0) chunksToLoad.push(targetChunk - 1);
      if (targetChunk < totalChunks - 1) chunksToLoad.push(targetChunk + 1);
      
      for (const chunkIdx of chunksToLoad) {
        if (!loadedChunks[chunkIdx]) {
          showChunkLoading();
          const chunk = await loadChunk(reportId, chunkIdx);
          if (chunk) {
            // 合并章节
            mergeSections(chunk);
          }
          hideChunkLoading();
        }
      }
    }

    // 合并章节（保持顺序）
    function mergeSections(chunk) {
      // 根据chunkIndex确定插入位置
      const existingIds = new Set(allSections.map(s => s.title));
      
      for (const section of chunk.sections) {
        if (!existingIds.has(section.title)) {
          allSections.push(section);
          existingIds.add(section.title);
        }
      }
      
      // 重新渲染目录
      renderTOC();
    }

    // 显示分块加载状态
    function showChunkLoading() {
      document.getElementById('chunkLoading').style.display = 'block';
    }

    function hideChunkLoading() {
      document.getElementById('chunkLoading').style.display = 'none';
    }

    // 显示无内容
    function showNoContent() {
      document.getElementById('loading').innerHTML = `
        <i class="fas fa-exclamation-circle"></i>
        <p>暂无完整内容</p>
        <button class="reader-page-btn" style="margin-top:1rem" onclick="goBack()">
          返回报告详情
        </button>
      `;
    }

    // 渲染目录
    function renderTOC() {
      const toc = document.getElementById('tocList');
      let html = '';
      
      allSections.forEach((section, idx) => {
        const levelClass = section.level === 1 ? '' : (section.level === 2 ? 'lv2' : 'lv3');
        html += `<div class="reader-toc-item ${levelClass}" onclick="scrollToSection(${idx})" data-idx="${idx}">${section.title}</div>`;
      });
      
      toc.innerHTML = html;
    }

    // 渲染右侧进度点
    function renderProgressIndicator() {
      const indicator = document.getElementById('progressIndicator');
      const totalPages = Math.ceil(allSections.length / sectionsPerPage);
      
      let html = '';
      for (let i = 0; i < totalPages; i++) {
        const activeClass = i === 0 ? 'active' : '';
        html += `<div class="progress-dot ${activeClass}" onclick="goToPage(${i + 1})" title="第${i + 1}页"></div>`;
      }
      
      indicator.innerHTML = html;
    }

    // 渲染当前页
    async function renderPage(page) {
      currentPage = page;
      
      const startIdx = (page - 1) * sectionsPerPage;
      const endIdx = Math.min(startIdx + sectionsPerPage, allSections.length);
      
      // 确保需要的章节已加载
      await ensureSectionsLoaded(endIdx - 1);
      
      const pageSections = allSections.slice(startIdx, endIdx);
      
      // 更新文章内容
      const article = document.getElementById('articleBody');
      let html = `<h1>${report.title}</h1>`;
      
      pageSections.forEach(section => {
        const tag = section.level === 1 ? 'h2' : 'h3';
        html += `
          <${tag} id="section-${startIdx + pageSections.indexOf(section)}">${section.title}</${tag}>
          ${section.content}
        `;
      });
      
      article.innerHTML = html;
      article.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('pagination').style.display = 'flex';
      
      // 更新分页信息
      const totalPages = Math.ceil(allSections.length / sectionsPerPage);
      document.getElementById('pageInfo').textContent = `${page} / ${totalPages}`;
      document.getElementById('prevBtn').disabled = page === 1;
      document.getElementById('nextBtn').disabled = page === totalPages;
      
      // 更新进度指示器
      updateProgressDots(page);
      
      // 更新目录选中状态
      updateTOCHighlight();
      
      // 滚动到顶部
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 切换页面
    async function changePage(direction) {
      const totalPages = Math.ceil(allSections.length / sectionsPerPage);
      const newPage = currentPage + direction;
      
      if (newPage >= 1 && newPage <= totalPages) {
        await renderPage(newPage);
      }
    }

    // 跳转到指定页
    async function goToPage(page) {
      await renderPage(page);
    }

    // 滚动到指定章节
    async function scrollToSection(idx) {
      // 确保章节已加载
      await ensureSectionsLoaded(idx);
      
      const el = document.getElementById(`section-${idx}`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // 更新当前页
        const page = Math.floor(idx / sectionsPerPage) + 1;
        if (page !== currentPage) {
          currentPage = page;
          updateProgressDots(page);
          updateTOCHighlight();
        }
      }
    }

    // 更新进度条
    function updateProgress() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = (scrollTop / docHeight) * 100;
      
      document.getElementById('progressFill').style.width = `${progress}%`;
    }

    // 更新进度点
    function updateProgressDots(page) {
      const dots = document.querySelectorAll('.progress-dot');
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === page - 1);
      });
    }

    // 更新目录高亮
    function updateTOCHighlight() {
      const items = document.querySelectorAll('.reader-toc-item');
      const startIdx = (currentPage - 1) * sectionsPerPage;
      const endIdx = Math.min(startIdx + sectionsPerPage, allSections.length);
      
      items.forEach((item, idx) => {
        item.classList.toggle('active', idx >= startIdx && idx < endIdx);
      });
    }

    // 切换边栏（移动端）
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('open');
    }

    // 切换主题
    function toggleTheme() {
      isDark = !isDark;
      document.body.classList.toggle('theme-dark', isDark);
      document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }

    // 字体大小控制
    function decreaseFont() {
      if (fontLevel > 0) {
        fontLevel--;
        updateFontSize();
      }
    }

    function increaseFont() {
      if (fontLevel < 2) {
        fontLevel++;
        updateFontSize();
      }
    }

    function updateFontSize() {
      document.body.classList.remove('font-small', 'font-medium', 'font-large');
      if (fontLevel === 0) document.body.classList.add('font-small');
      else if (fontLevel === 2) document.body.classList.add('font-large');
      else document.body.classList.add('font-medium');
    }

    // 全屏
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fullscreenIcon').className = 'fas fa-compress';
      } else {
        document.exitFullscreen();
        document.getElementById('fullscreenIcon').className = 'fas fa-expand';
      }
    }

    // 返回
    function goBack() {
      window.location.href = `report-detail.html?id=${reportId}`;
    }
  </script>
</body>
</html>
